<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>主宰面板</title>
<style>
/* ===== RESET ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:calc(100vw / 375 * 16);touch-action:manipulation}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro","PingFang SC","Helvetica Neue",sans-serif;background:#0f0f13;color:#e8e8ed;line-height:1.5;-webkit-font-smoothing:antialiased;overflow-x:hidden}

/* ===== VARIABLES ===== */
:root{--bg:#0f0f13;--bg2:rgba(255,255,255,0.03);--bg3:rgba(255,255,255,0.04);--border:rgba(255,255,255,0.06);--text:#e8e8ed;--text2:#888;--text3:#555;--text4:#444;--accent:#5b9aff;--accent2:#2ed573;--accent3:#ff9f43;--accent4:#a078ff;--accent5:#ff6b6b;--radius:0.75rem;--sidebar-w:220px}

/* ===== APP ===== */
.app{display:flex;min-height:100vh;min-height:100dvh;width:100%}

/* ===== SIDEBAR (desktop) ===== */
.sidebar{display:none}
@media(min-width:768px){
  .sidebar{display:flex;flex-direction:column;width:var(--sidebar-w);border-right:1px solid var(--border);padding:1.5rem 0.75rem;flex-shrink:0;position:fixed;top:0;left:0;height:100vh;height:100dvh;z-index:50;background:var(--bg)}
  .sidebar .logo{font-size:1.1rem;font-weight:700;color:#fff;padding:0 0.75rem 1.25rem;display:flex;align-items:center;gap:0.375rem}
  .sidebar .logo small{font-size:0.75rem;color:var(--text3);font-weight:400}
  .sidebar nav{display:flex;flex-direction:column;gap:0.125rem;flex:1;overflow-y:auto}
  .nav-item{display:flex;align-items:center;gap:0.5rem;padding:0.45rem 0.75rem;border-radius:0.5rem;font-size:0.85rem;color:var(--text3);cursor:pointer;transition:all 0.12s;background:none;border:none;text-align:left;width:100%}
  .nav-item:hover{background:var(--bg3);color:var(--text2)}
  .nav-item.active{background:rgba(91,154,255,0.1);color:var(--accent);font-weight:500}
  .nav-item .badge{margin-left:auto;font-size:0.6rem;background:rgba(91,154,255,0.12);color:var(--accent);padding:0.05rem 0.35rem;border-radius:0.75rem;font-weight:500}
  .nav-divider{height:1px;background:var(--border);margin:0.5rem 0.75rem}
  .main{margin-left:var(--sidebar-w);width:calc(100% - var(--sidebar-w))}
  .mobile-header,.tab-bar{display:none!important}
}

/* ===== MOBILE HEADER ===== */
.mobile-header{display:flex;align-items:center;justify-content:space-between;padding:0.75rem 1rem 0.25rem;position:sticky;top:0;z-index:40;background:var(--bg)}
.mobile-header h1{font-size:1.15rem;font-weight:700;color:#fff;display:flex;align-items:center;gap:0.25rem}
.mobile-header .date{font-size:0.65rem;color:var(--text3)}
.mobile-header .actions{display:flex;gap:0.375rem}
.mobile-header .actions button{background:var(--bg3);border:1px solid var(--border);color:var(--text2);width:2rem;height:2rem;border-radius:0.5rem;font-size:0.85rem;cursor:pointer}

/* ===== MAIN CONTENT ===== */
.main{flex:1;overflow-y:auto;padding:0.5rem 0.85rem 5.5rem;min-height:100vh;min-height:100dvh}
@media(min-width:768px){.main{padding:1.25rem 1.5rem 1.5rem}}

/* ===== TOP BAR (desktop) ===== */
.top-bar{display:none}
@media(min-width:768px){
  .top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem}
  .top-bar .greeting{font-size:1.15rem;font-weight:600;color:#fff}
  .top-bar .greeting small{font-size:0.7rem;color:var(--text3);font-weight:400;margin-left:0.5rem}
  .top-bar .btn{background:var(--bg3);border:1px solid var(--border);color:var(--text2);padding:0.35rem 0.75rem;border-radius:0.5rem;font-size:0.78rem;cursor:pointer;transition:background 0.12s}
  .top-bar .btn:hover{background:rgba(91,154,255,0.1);color:var(--accent)}
  .top-bar .btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
  .top-bar .btn.primary:hover{background:#4a89f0}
  .top-bar .actions{display:flex;gap:0.375rem}
}

/* ===== SECTION HEADER ===== */
.section-header{display:flex;align-items:center;justify-content:space-between;margin:1rem 0 0.5rem}
.section-header .label{font-size:0.7rem;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.05em;display:flex;align-items:center;gap:0.375rem}
.section-header .action{font-size:0.65rem;color:var(--accent);cursor:pointer;background:none;border:none;padding:0.15rem 0.3rem}

/* ===== CARD ===== */
.card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:0.75rem;margin-bottom:0.5rem;transition:background 0.12s}

/* ===== CALENDAR STRIP ===== */
.cal-strip{display:flex;gap:0.25rem;overflow-x:auto;padding:0.25rem 0 0.5rem;-webkit-overflow-scrolling:touch}
.cal-strip::-webkit-scrollbar{display:none}
.day-pill{flex-shrink:0;width:2.4rem;padding:0.35rem 0;border-radius:0.5rem;text-align:center;background:var(--bg3);border:1px solid transparent;cursor:pointer;transition:all 0.1s}
.day-pill.today{background:rgba(91,154,255,0.12);border-color:var(--accent)}
.day-pill .dow{font-size:0.55rem;color:var(--text3)}
.day-pill.today .dow{color:var(--accent)}
.day-pill .dom{font-size:0.8rem;font-weight:600;color:var(--text2);margin-top:0.05rem}
.day-pill.today .dom{color:#fff}
.day-pill .dot{width:3px;height:3px;border-radius:50%;margin:0.1rem auto 0}
.day-pill .dot.has{background:var(--accent)}

/* ===== EVENT ITEM ===== */
.event-row{display:flex;gap:0.5rem;padding:0.35rem 0;align-items:flex-start}
.event-row+.event-row{border-top:1px solid var(--border)}
.event-dot{width:6px;height:6px;border-radius:50%;margin-top:0.35rem;flex-shrink:0}
.event-dot.task{background:var(--accent)}
.event-dot.appt{background:var(--accent3)}
.event-dot.remind{background:var(--accent2)}
.event-body{flex:1;min-width:0}
.event-title{font-size:0.82rem;font-weight:500;color:var(--text);display:flex;align-items:center;gap:0.375rem}
.event-title .tag{font-size:0.55rem;padding:0.05rem 0.3rem;border-radius:0.2rem;background:rgba(255,255,255,0.06);color:var(--text3)}
.event-meta{font-size:0.65rem;color:var(--text3);margin-top:0.05rem}
.event-check{width:1.1rem;height:1.1rem;border-radius:50%;border:2px solid rgba(255,255,255,0.1);flex-shrink:0;margin-top:0.15rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s}
.event-check:hover{border-color:var(--accent2)}
.event-check.done{background:var(--accent2);border-color:var(--accent2)}
.event-check.done::after{content:'✓';color:#fff;font-size:0.65rem;font-weight:700}
.event-row.done .event-title{color:var(--text4);text-decoration:line-through}
.event-row.done .event-meta{color:var(--text4)}

/* ===== DESKTOP DASHBOARD GRID ===== */
.dash-grid{display:none}
@media(min-width:768px){
  .dash-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0.75rem;margin-top:0.75rem}
  .dash-col{display:flex;flex-direction:column;gap:0.5rem}
  .panel{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
  .panel-header{display:flex;align-items:center;justify-content:space-between;padding:0.65rem 0.85rem 0.35rem}
  .panel-title{font-size:0.65rem;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.05em}
  .panel-action{font-size:0.6rem;color:var(--accent);cursor:pointer;background:none;border:none}
  .panel-body{padding:0 0.85rem 0.65rem}
}

/* ===== PROJECTS ===== */
.project-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.5rem}
@media(min-width:768px){.project-grid{grid-template-columns:1fr 1fr 1fr}}
@media(min-width:1200px){.project-grid{grid-template-columns:1fr 1fr 1fr 1fr}}
.pcard{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:0.7rem;cursor:pointer}
.pcard:active{background:var(--bg2)}
.pcard .status{font-size:0.58rem;padding:0.05rem 0.3rem;border-radius:0.2rem;display:inline-block;margin-bottom:0.3rem;font-weight:500}
.pcard .status.s-plan{background:var(--bg3);color:var(--text2)}
.pcard .status.s-doing{background:rgba(91,154,255,0.12);color:var(--accent)}
.pcard .status.s-done{background:rgba(46,213,115,0.12);color:var(--accent2)}
.pcard .status.s-arch{background:rgba(255,255,255,0.04);color:var(--text4)}
.pcard .pname{font-size:0.82rem;font-weight:600;color:var(--text);margin-bottom:0.25rem;display:flex;align-items:center;gap:0.25rem}
.pcard .ptags{display:flex;gap:0.15rem;flex-wrap:wrap;margin-bottom:0.35rem}
.pcard .ptag{font-size:0.55rem;padding:0.05rem 0.25rem;border-radius:0.15rem;font-weight:500}
.ptag.work{background:rgba(255,159,67,0.1);color:var(--accent3)}
.ptag.life{background:rgba(46,213,115,0.1);color:var(--accent2)}
.ptag.think{background:rgba(160,120,255,0.1);color:var(--accent4)}
.ptag.family{background:rgba(255,107,107,0.1);color:var(--accent5)}
.pbar{height:3px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden}
.pfill{height:100%;border-radius:2px;transition:width 0.3s}
.pfill.blue{background:var(--accent)}
.pfill.green{background:var(--accent2)}
.pfill.orange{background:var(--accent3)}
.pfill.purple{background:var(--accent4)}

/* ===== GOALS ===== */
.goal-row{display:flex;gap:0.5rem;padding:0.5rem 0;align-items:center}
.goal-row+.goal-row{border-top:1px solid var(--border)}
.goal-icon{width:1.75rem;height:1.75rem;border-radius:0.4rem;display:flex;align-items:center;justify-content:center;font-size:0.85rem;flex-shrink:0}
.goal-icon.long{background:rgba(160,120,255,0.1);color:var(--accent4)}
.goal-icon.short{background:rgba(91,154,255,0.1);color:var(--accent)}
.goal-body{flex:1;min-width:0}
.goal-title{font-size:0.82rem;font-weight:500;color:var(--text)}
.goal-meta{font-size:0.6rem;color:var(--text4);margin-top:0.05rem}
.goal-pct{font-size:0.72rem;font-weight:600;color:var(--text3);min-width:2.5rem;text-align:right}
.goal-bar{height:3px;background:rgba(255,255,255,0.06);border-radius:2px;margin-top:0.15rem;overflow:hidden}
.goal-bar .fill{height:100%;border-radius:2px;transition:width 0.3s}
.goal-bar .fill.long{background:var(--accent4)}
.goal-bar .fill.short{background:var(--accent)}

/* ===== ENTRIES ===== */
.entry-row{display:flex;gap:0.5rem;padding:0.5rem 0;align-items:flex-start}
.entry-row+.entry-row{border-top:1px solid var(--border)}
.entry-icon{width:1.25rem;height:1.25rem;border-radius:0.3rem;display:flex;align-items:center;justify-content:center;font-size:0.6rem;flex-shrink:0;margin-top:0.05rem}
.entry-icon.thought{background:rgba(160,120,255,0.1);color:var(--accent4)}
.entry-icon.action{background:rgba(46,213,115,0.1);color:var(--accent2)}
.entry-icon.plan{background:rgba(255,159,67,0.1);color:var(--accent3)}
.entry-body{flex:1;min-width:0}
.entry-title{font-size:0.82rem;font-weight:500;color:var(--text)}
.entry-text{font-size:0.68rem;color:var(--text3);margin-top:0.05rem;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.entry-date{font-size:0.55rem;color:var(--text4);margin-top:0.1rem}
.entry-filter{display:flex;gap:0.25rem;margin-bottom:0.5rem;flex-wrap:wrap}
.entry-filter span{font-size:0.65rem;padding:0.15rem 0.4rem;border-radius:1rem;background:var(--bg3);color:var(--text3);cursor:pointer;transition:all 0.1s}
.entry-filter span.active{background:rgba(91,154,255,0.12);color:var(--accent);font-weight:500}

/* ===== TAB CONTENT ===== */
.tab-page{display:none}
.tab-page.active{display:block}
@media(min-width:768px){
  .tab-page{display:block!important}
  .tab-page.dim{display:none!important}
  .dash-grid .tab-page{display:block!important}
}

/* ===== FAB ===== */
.fab{position:fixed;bottom:5rem;right:0.85rem;width:2.6rem;height:2.6rem;border-radius:50%;background:var(--accent);border:none;color:#fff;font-size:1.4rem;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(91,154,255,0.3);cursor:pointer;z-index:40;transition:transform 0.12s}
.fab:active{transform:scale(0.9)}
@media(min-width:768px){.fab{bottom:1.25rem}}

/* ===== TAB BAR (mobile) ===== */
.tab-bar{position:fixed;bottom:0;left:0;width:100%;background:rgba(15,15,19,0.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;padding:0.25rem 0 0.7rem;z-index:100}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:0.05rem;padding:0.2rem;background:none;border:none;color:var(--text3);font-size:0.6rem;cursor:pointer;transition:color 0.12s}
.tab-btn.active{color:var(--accent)}
.tab-btn .icon{font-size:1.15rem;line-height:1}

/* ===== MODAL ===== */
.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:200;display:none;align-items:flex-end;justify-content:center}
.modal-overlay.show{display:flex}
@media(min-width:768px){.modal-overlay{align-items:center}}
.modal{background:#1a1a20;border-radius:1rem 1rem 0 0;width:100%;max-width:430px;max-height:75vh;overflow-y:auto;padding:1rem;animation:slideUp 0.2s ease}
@media(min-width:768px){.modal{border-radius:1rem;max-height:80vh}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:0.75rem;padding-bottom:0.5rem;border-bottom:1px solid var(--border)}
.modal-title{font-size:0.9rem;font-weight:600}
.modal-close{background:none;border:none;color:var(--text3);font-size:1.2rem;cursor:pointer;padding:0.25rem}
.modal form{display:flex;flex-direction:column;gap:0.5rem}
.modal label{font-size:0.7rem;color:var(--text3);font-weight:500}
.modal input,.modal select,.modal textarea{background:var(--bg3);border:1px solid var(--border);border-radius:0.5rem;padding:0.5rem;color:var(--text);font-size:0.82rem;outline:none;transition:border 0.12s;width:100%}
.modal input:focus,.modal select:focus,.modal textarea:focus{border-color:var(--accent)}
.modal textarea{resize:vertical;min-height:3rem}
.modal .form-row{display:flex;gap:0.5rem}
.modal .form-row>*{flex:1}
.modal .btn-submit{background:var(--accent);border:none;color:#fff;padding:0.55rem;border-radius:0.5rem;font-size:0.85rem;cursor:pointer;margin-top:0.25rem;font-weight:500}
.modal .btn-submit:active{opacity:0.8}

/* ===== QUICK ADD (desktop) ===== */
.quick-add-row{display:flex;gap:0.375rem;padding:0.4rem 0;align-items:center}
.quick-add-row select,.quick-add-row input{background:var(--bg3);border:1px solid var(--border);border-radius:0.375rem;padding:0.35rem 0.5rem;color:var(--text);font-size:0.75rem;outline:none}
.quick-add-row input{flex:1;min-width:0}
.quick-add-row select{width:4.5rem}
.quick-add-row button{background:var(--accent);border:none;color:#fff;padding:0.35rem 0.65rem;border-radius:0.375rem;font-size:0.72rem;cursor:pointer;white-space:nowrap}

/* ===== STATS ROW ===== */
.stats-row{display:flex;gap:0.5rem;text-align:center;padding:0.25rem 0}
.stats-row .stat{flex:1;background:var(--bg2);border-radius:0.5rem;padding:0.5rem 0.25rem}
.stats-row .stat .num{font-size:1.1rem;font-weight:700;color:var(--accent)}
.stats-row .stat .num.green{color:var(--accent2)}
.stats-row .stat .num.orange{color:var(--accent3)}
.stats-row .stat .lbl{font-size:0.55rem;color:var(--text4);margin-top:0.1rem}

/* ===== EMPTY STATE ===== */
.empty-state{text-align:center;padding:1.5rem 1rem;color:var(--text4)}
.empty-state .icon{font-size:2rem;margin-bottom:0.5rem;opacity:0.3}
.empty-state .msg{font-size:0.78rem}

/* ===== LOADING ===== */
.loading{text-align:center;padding:1rem;color:var(--text4);font-size:0.78rem}
.loading .spinner{display:inline-block;width:1.2rem;height:1.2rem;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.6s linear infinite;margin-bottom:0.5rem}
@keyframes spin{to{transform:rotate(360deg)}}

/* ===== ERROR ===== */
.error-msg{text-align:center;padding:1rem;color:var(--accent5);font-size:0.78rem}

/* ===== DELETE BTN ===== */
.btn-del{background:rgba(255,107,107,0.1);border:1px solid rgba(255,107,107,0.15);color:var(--accent5);padding:0.2rem 0.5rem;border-radius:0.3rem;font-size:0.6rem;cursor:pointer}

/* ===== RESPONSIVE TWEAKS ===== */
@media(max-width:767px){
  .desktop-only{display:none!important}
}
@media(min-width:768px){
  .mobile-only{display:none!important}
}
</style>
</head>
<body>
<div class="app" id="app">

  <!-- ===== DESKTOP SIDEBAR ===== -->
  <aside class="sidebar" id="sidebar">
    <div class="logo">🦞 主宰 <small>面板</small></div>
    <nav id="sidebarNav">
      <button class="nav-item active" data-tab="today">📋 概览</button>
      <button class="nav-item" data-tab="calendar">📅 日历</button>
      <button class="nav-item" data-tab="projects">📊 项目 <span class="badge" id="projectBadge">0</span></button>
      <button class="nav-item" data-tab="goals">🎯 目标 <span class="badge" id="goalBadge">0</span></button>
      <button class="nav-item" data-tab="library">📚 库</button>
      <div class="nav-divider"></div>
      <button class="nav-item" id="dataBtn">📥 导出备份</button>
    </nav>
  </aside>

  <!-- ===== MOBILE HEADER ===== -->
  <div class="mobile-header" id="mobileHeader">
    <h1>🦞 主宰 <span class="date" id="mobileDate"></span></h1>
    <div class="actions">
      <button id="mobileAddBtn" aria-label="添加">＋</button>
    </div>
  </div>

  <div class="main" id="mainContent">

    <!-- ===== TOP BAR (desktop) ===== -->
    <div class="top-bar">
      <div class="greeting" id="greeting">下午好 <small id="todayDate"></small></div>
      <div class="actions">
        <button class="btn" id="exportBtn">📥 导出</button>
        <button class="btn primary" id="addBtn">＋ 快速添加</button>
      </div>
    </div>

    <!-- ===== DESKTOP DASHBOARD ===== -->
    <div class="dash-grid" id="dashGrid">
      <div class="dash-col" data-dash-col="1">
        <div class="panel">
          <div class="panel-header"><span class="panel-title">📅 本周</span></div>
          <div class="panel-body" id="dashCalendar"></div>
        </div>
        <div class="panel">
          <div class="panel-header"><span class="panel-title">📋 今日待办</span> <button class="panel-action" onclick="openModal('event')">+</button></div>
          <div class="panel-body" id="dashTodayEvents"></div>
        </div>
      </div>
      <div class="dash-col" data-dash-col="2">
        <div class="panel">
          <div class="panel-header"><span class="panel-title">📊 项目</span> <button class="panel-action" onclick="switchTab('projects')">全部 →</button></div>
          <div class="panel-body" id="dashProjects"></div>
        </div>
        <div class="panel">
          <div class="panel-header"><span class="panel-title">🎯 目标</span> <button class="panel-action" onclick="switchTab('goals')">全部 →</button></div>
          <div class="panel-body" id="dashGoals"></div>
        </div>
      </div>
      <div class="dash-col" data-dash-col="3">
        <div class="panel">
          <div class="panel-header"><span class="panel-title">💭 最近</span></div>
          <div class="panel-body" id="dashEntries"></div>
        </div>
        <div class="panel">
          <div class="panel-header"><span class="panel-title">💡 快速录入</span></div>
          <div class="panel-body">
            <div class="quick-add-row">
              <select id="quickType"><option value="thought">💭思考</option><option value="action">✅行动</option><option value="plan">🗓️规划</option></select>
              <input type="text" id="quickInput" placeholder="随手记一条..." />
              <button id="quickSave">保存</button>
            </div>
          </div>
        </div>
        <div class="panel">
          <div class="panel-header"><span class="panel-title">📊 统计</span></div>
          <div class="panel-body" id="dashStats"></div>
        </div>
      </div>
    </div>

    <!-- ===== TAB: TODAY (mobile) ===== -->
    <div class="tab-page active mobile-only" id="pageToday">

const state = {

  entries: [],
  today: new Date(),
  selectedDate: new Date(),
  currentTab: 'today',
  entryFilter: 'all'
};

// ============================================================
// UTILITY
// ============================================================
function fmtDate(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}
function fmtDisplay(d) {
  return `${d.getMonth() + 1}.${String(d.getDate()).padStart(2, '0')}`;
}
function isToday(d) {
  const t = state.today;
  return d.getFullYear() === t.getFullYear() && d.getMonth() === t.getMonth() && d.getDate() === t.getDate();
}
function isSameDay(a, b) {
  return a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate();
}
function dowName(d) {
  return ['日','一','二','三','四','五','六'][d.getDay()];
}
const DAY_MS = 86400000;

// ============================================================
// DATA LOADING
// ============================================================
async function loadAll() {
  const [events, projects, goals, entries] = await Promise.all([
    supabase.from('calendar_events').select('*').order('event_date').order('start_time'),
    supabase.from('projects').select('*').order('created_at'),
    supabase.from('goals').select('*').order('created_at'),
    supabase.from('entries').select('*').order('created_at', { ascending: false })
  ]);
  if (events.error) { console.error('Events load error:', events.error); return; }
  state.events = events.data || [];
  state.projects = projects.data || [];
  state.goals = goals.data || [];
  state.entries = entries.data || [];
  render();
}

// ============================================================
// CRUD HELPERS
// ============================================================
async function addEvent(data) {
  const { error } = await supabase.from('calendar_events').insert(data);
  if (error) console.error(error); else await loadAll();
}
async function updateEvent(id, data) {
  const { error } = await supabase.from('calendar_events').update(data).eq('id', id);
  if (error) console.error(error); else await loadAll();
}
async function deleteEvent(id) {
  const { error } = await supabase.from('calendar_events').delete().eq('id', id);
  if (error) console.error(error); else await loadAll();
}
async function addProject(data) {
  const { error } = await supabase.from('projects').insert(data);
  if (error) console.error(error); else await loadAll();
}
async function addGoal(data) {
  const { error } = await supabase.from('goals').insert(data);
  if (error) console.error(error); else await loadAll();
}
async function addEntry(data) {
  const { error } = await supabase.from('entries').insert(data);
  if (error) console.error(error); else await loadAll();
}

// ============================================================
// RENDER
// ============================================================
function render() {
  const now = state.today;
  document.getElementById('mobileDate').textContent = fmtDisplay(now);
  document.getElementById('todayDate').textContent = `${fmtDate(now)} · ${dowName(now)}`;
  const hour = now.getHours();
  const greet = hour < 12 ? '早上好' : hour < 18 ? '下午好' : '晚上好';
  document.getElementById('greeting').childNodes[0].textContent = greet;

  // Badges
  document.getElementById('projectBadge').textContent = state.projects.length;
  document.getElementById('goalBadge').textContent = state.goals.length;

  renderCalendarStrips();
  renderTodayEvents();
  renderWeekEvents();
  renderProjects();
  renderGoals();
  renderEntries();
  renderDashCalendar();
  renderDashTodayEvents();
  renderDashProjects();
  renderDashGoals();
  renderDashEntries();
  renderDashStats();
}

// ===== Calendar Strip =====
function renderCalendarStrips() {
  const html = [];
  for (let i = -1; i <= 6; i++) {
    const d = new Date(state.today.getTime() + i * DAY_MS);
    const cls = i === 0 ? 'today' : '';
    const dot = state.events.some(e => e.event_date === fmtDate(d)) ? '<div class="dot has"></div>' : '<div class="dot"></div>';
    html.push(`<div class="day-pill ${cls}" data-date="${fmtDate(d)}"><div class="dow">${dowName(d)}</div><div class="dom">${d.getDate()}</div>${dot}</div>`);
  }
  document.getElementById('calStrip').innerHTML = html.join('');
  document.getElementById('calStripFull').innerHTML = html.join('');

  const selDate = state.selectedDate;
  document.getElementById('selectedDayLabel').textContent = isToday(selDate) ? '📅 今天' : fmtDate(selDate);
}

// ===== Today Events =====
function renderTodayEvents() {
  const todayStr = fmtDate(state.today);
  const items = state.events.filter(e => e.event_date === todayStr).sort((a, b) => (a.start_time||'') > (b.start_time||'') ? 1 : -1);
  renderEventList('todayEvents', items);
}

function renderWeekEvents() {
  const todayStr = fmtDate(state.today);
  const items = state.events.filter(e => e.event_date > todayStr && e.event_date <= fmtDate(new Date(state.today.getTime() + 6 * DAY_MS)));
  renderEventList('weekEvents', items);
}

function renderDayEvents() {
  const sel = fmtDate(state.selectedDate);
  const items = state.events.filter(e => e.event_date === sel).sort((a, b) => (a.start_time||'') > (b.start_time||'') ? 1 : -1);
  renderEventList('dayEvents', items);
}

function renderEventList(elId, items) {
  const el = document.getElementById(elId);
  if (!items.length) {
    el.innerHTML = '<div class="empty-state"><div class="icon">📭</div><div class="msg">暂无事项</div></div>';
    return;
  }
  el.innerHTML = items.map(e => `
    <div class="card">
      <div class="event-row ${e.completed ? 'done' : ''}">
        <div class="event-dot ${e.event_type||'task'}"></div>
        <div class="event-body">
          <div class="event-title">${e.title}</div>
          <div class="event-meta">${e.start_time||''}${e.start_time && e.description ? ' · ' : ''}${e.description||''}</div>
        </div>
        <div class="event-check ${e.completed ? 'done' : ''}" onclick="window.toggleEvent('${e.id}', ${!e.completed})"></div>
      </div>
    </div>
  `).join('');
}

// ===== Projects =====
function renderProjects() {
  const el = document.getElementById('projectGrid');
  if (!state.projects.length) {
    el.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="icon">📦</div><div class="msg">暂无项目</div></div>';
    return;
  }
  const statusMap = {planning:'🎯 规划中',in_progress:'🚧 进行中',completed:'✅ 已完成',archived:'📦 已归档'};
  const statusCls = {planning:'s-plan',in_progress:'s-doing',completed:'s-done',archived:'s-arch'};
  const tagCls = {工作:'work',个人:'life',务虚:'think',家庭:'family'};
  el.innerHTML = state.projects.map(p => `
    <div class="pcard">
      <span class="status ${statusCls[p.status]||'s-plan'}">${statusMap[p.status]||p.status}</span>
      <div class="pname">${p.name}</div>
      <div class="ptags">${(p.tags||[]).map(t => `<span class="ptag ${tagCls[t]||'work'}">${t}</span>`).join('')}</div>
      <div class="pbar"><div class="pfill ${p.progress>=80?'green':p.progress>=40?'blue':'purple'}" style="width:${p.progress||0}%"></div></div>
    </div>
  `).join('');
}

// ===== Goals =====
function renderGoals() {
  ['long','short'].forEach(type => {
    const el = document.getElementById(type === 'long' ? 'longGoals' : 'shortGoals');
    const items = state.goals.filter(g => g.type === (type === 'long' ? 'long_term' : 'short_term'));
    if (!items.length) {
      el.innerHTML = '<div class="empty-state"><div class="icon">🎯</div><div class="msg">暂无目标</div></div>';
      return;
    }
    el.innerHTML = items.map(g => `
      <div class="card">
        <div class="goal-row">
          <div class="goal-icon ${type}">${type==='long'?'🏗️':'🎯'}</div>
          <div class="goal-body">
            <div class="goal-title">${g.title}</div>
            <div class="goal-meta">${g.due_date ? '截止 '+g.due_date : ''}${g.description ? ' · '+g.description : ''}</div>

      </div>
    `).join('');
  });
}

  const el = document.getElementById('entryList');
  const filter = state.entryFilter;
  let items = state.entries;
  if (filter !== 'all') items = items.filter(e => e.type === filter);
  if (!items.length) {
    el.innerHTML = '<div class="empty-state"><div class="icon">📝</div><div class="msg">暂无记录</div></div>';

  }
  const iconMap = {thought:'💭',action:'✅',plan:'🗓️'};
  const clsMap = {thought:'thought',action:'action',plan:'plan'};

  el.innerHTML = items.map(e => `
    <div class="entry-row">
      <div class="entry-icon ${clsMap[e.type]}">${iconMap[e.type]}</div>
      <div class="entry-body">
        <div class="entry-title">${e.title||'无标题'}</div>
        <div class="entry-text">${e.content||''}</div>
        <div class="entry-date">${e.entry_date||''}${e.related_project_id ? ' · 关联项目' : ''}</div>
      </div>
    </div>
  `).join('');
}

// ===== Desktop Dashboard Sub-views =====
function renderDashCalendar() {

    const d = new Date(state.today.getTime() + i * DAY_MS);

    days.push(`<div class="mini-day ${cls}"><div class="dow">${dowName(d)}</div><div class="num">${d.getDate()}</div></div>`);
  }
  el.innerHTML = `<div style="display:flex;gap:0.25rem">${days.join('')}</div>`;
}

function renderDashTodayEvents() {
  const todayStr = fmtDate(state.today);
  const items = state.events.filter(e => e.event_date === todayStr && !e.completed).sort((a,b) => (a.start_time||'') > (b.start_time||'') ? 1 : -1).slice(0, 5);
  const el = document.getElementById('dashTodayEvents');

        <div style="font-size:0.6rem;color:var(--text3);margin-top:0.05rem">${e.start_time||''}</div>
      </div>
    </div>
  `).join('');
}

function renderDashProjects() {
  const el = document.getElementById('dashProjects');

  if (!items.length) { el.innerHTML = '<div style="font-size:0.72rem;color:var(--text4);padding:0.5rem 0">暂无项目</div>'; return; }

      </div>

        <div style="height:3px;background:rgba(255,255,255,0.06);border-radius:2px;margin-top:0.1rem;overflow:hidden">
          <div style="height:100%;border-radius:2px;width:${p.progress||0}%;background:${p.progress>=80?'#2ed573':p.progress>=40?'#5b9aff':'#a078ff'}"></div>
        </div>
      </div>
    </div>
  `).join('');
}

function renderDashGoals() {
  const el = document.getElementById('dashGoals');
  const items = state.goals.slice(0, 3);
  if (!items.length) { el.innerHTML = '<div style="font-size:0.72rem;color:var(--text4);padding:0.5rem 0">暂无目标</div>'; return; }
  el.innerHTML = items.map(g => `
    <div style="display:flex;gap:0.5rem;padding:0.35rem 0;align-items:center;border-bottom:1px solid var(--border)">
      <div style="flex:1;min-width:0">
        <div style="font-size:0.78rem;color:var(--text)">${g.title}</div>
        <div style="font-size:0.6rem;color:var(--text4)">${g.type==='long_term'?'长期':'短期'}</div>
      </div>
      <div style="font-size:0.72rem;font-weight:600;color:var(--text3)">${g.progress||0}%</div>
    </div>
  `).join('');
}

function renderDashEntries() {
  const el = document.getElementById('dashEntries');
  const items = state.entries.slice(0, 3);
  const iconMap = {thought:'💭',action:'✅',plan:'🗓️'};
  if (!items.length) { el.innerHTML = '<div style="font-size:0.72rem;color:var(--text4);padding:0.5rem 0">暂无记录</div>'; return; }

function renderDashStats() {
  const total = state.events.length;
  const done = state.events.filter(e => e.completed).length;

  document.getElementById('dashStats').innerHTML = `
    <div class="stats-row">
      <div class="stat"><div class="num">${total}</div><div class="lbl">总事项</div></div>
      <div class="stat"><div class="num green">${done}</div><div class="lbl">已完成</div></div>
      <div class="stat"><div class="num orange">${entries}</div><div class="lbl">记录</div></div>
    </div>
  `;
}

// ============================================================
// TAB SWITCHING
// ============================================================
window.switchTab = function(tab) {
  state.currentTab = tab;
  document.querySelectorAll('.tab-page').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  
  const pageEl = document.getElementById('page' + tab.charAt(0).toUpperCase() + tab.slice(1));
  if (pageEl) pageEl.classList.add('active');
  
  document.querySelectorAll(`[data-tab="${tab}"]`).forEach(el => el.classList.add('active'));
};

// ============================================================
// MODAL
// ============================================================
function openModal(type, data) {
  const overlay = document.getElementById('modalOverlay');
  const title = document.getElementById('modalTitle');
  const form = document.getElementById('modalForm');
  
  const types = {
    event: {
      title: '📅 添加事项',
      fields: `
        <label>标题</label><input name="title" required placeholder="事项名称" value="${data?.title||''}">
        <div class="form-row">
          <div><label>日期</label><input name="event_date" type="date" value="${data?.event_date||fmtDate(state.selectedDate)}"></div>
          <div><label>时间</label><input name="start_time" type="time" value="${data?.start_time||''}"></div>
        </div>
        <label>类型</label>
        <select name="event_type"><option value="task" ${data?.event_type==='task'?'selected':''}>任务</option><option value="appointment" ${data?.event_type==='appointment'?'selected':''}>预约</option><option value="reminder" ${data?.event_type==='reminder'?'selected':''}>提醒</option></select>
        <label>备注</label><textarea name="description">${data?.description||''}</textarea>
        <button class="btn-submit" type="submit">保存</button>
      `,
      submit: async (fd) => {
        const obj = Object.fromEntries(fd);
        if (data?.id) await updateEvent(data.id, obj);
        else await addEvent(obj);
      }
    },
    project: {
      title: '📊 新建项目',
      fields: `
        <label>项目名</label><input name="name" required placeholder="项目名称" value="${data?.name||''}">
        <div class="form-row">
          <div><label>状态</label><select name="status"><option value="planning">规划中</option><option value="in_progress" selected>进行中</option><option value="completed">已完成</option><option value="archived">已归档</option></select></div>
          <div><label>进度 %</label><input name="progress" type="number" min="0" max="100" value="${data?.progress||0}"></div>
        </div>
        <label>标签（逗号分隔）</label><input name="tags" placeholder="工作,个人,务虚,家庭" value="${(data?.tags||[]).join(',')}">
        <label>描述</label><textarea name="description">${data?.description||''}</textarea>
        <button class="btn-submit" type="submit">保存</button>
      `,
      submit: async (fd) => {
        const obj = Object.fromEntries(fd);
        obj.tags = obj.tags ? obj.tags.split(',').map(t=>t.trim()).filter(Boolean) : [];
        obj.progress = parseInt(obj.progress) || 0;
        await addProject(obj);
      }
    },
    goal: {
      title: '🎯 新建目标',
      fields: `
        <label>标题</label><input name="title" required placeholder="目标名称" value="${data?.title||''}">
        <div class="form-row">
          <div><label>类型</label><select name="type"><option value="long_term">长期</option><option value="short_term" selected>短期</option></select></div>
          <div><label>截止日期</label><input name="due_date" type="date" value="${data?.due_date||''}"></div>
        </div>
        <label>进度 %</label><input name="progress" type="number" min="0" max="100" value="${data?.progress||0}">
        <label>描述</label><textarea name="description">${data?.description||''}</textarea>
        <button class="btn-submit" type="submit">保存</button>
      `,
      submit: async (fd) => {
        const obj = Object.fromEntries(fd);
        obj.progress = parseInt(obj.progress) || 0;
        await addGoal(obj);
      }
    },
    entry: {
      title: '📚 记录',
      fields: `
        <label>类型</label>
        <select name="type"><option value="thought">💭 思考</option><option value="action">✅ 行动</option><option value="plan">🗓️ 规划</option></select>
        <label>标题</label><input name="title" required placeholder="标题" value="${data?.title||''}">
        <label>内容</label><textarea name="content" rows="3">${data?.content||''}</textarea>
        <button class="btn-submit" type="submit">保存</button>
      `,
      submit: async (fd) => {
        const obj = Object.fromEntries(fd);
        obj.entry_date = fmtDate(state.today);
        await addEntry(obj);
      }
    }
  };

  const config = types[type];
  title.textContent = config.title;
  form.innerHTML = config.fields;
  overlay.classList.add('show');

  form.onsubmit = async (e) => {
    e.preventDefault();
    const fd = new FormData(form);
    await config.submit(fd);
    overlay.classList.remove('show');
  };
}

// Close modal
document.getElementById('modalClose').onclick = () => document.getElementById('modalOverlay').classList.remove('show');
document.getElementById('modalOverlay').onclick = (e) => { if (e.target === e.currentTarget) e.target.classList.remove('show'); };

// ============================================================
// EVENT TOGGLE COMPLETE
// ============================================================
window.toggleEvent = async (id, completed) => {
  await updateEvent(id, { completed });
};

// ============================================================
// INIT
// ============================================================
document.addEventListener('DOMContentLoaded', () => {
  // Tab switching (mobile)
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => window.switchTab(btn.dataset.tab));
  });
  document.querySelectorAll('.nav-item[data-tab]').forEach(btn => {
    btn.addEventListener('click', () => window.switchTab(btn.dataset.tab));
  });

  // FAB / add buttons
  document.getElementById('fab').onclick = () => openModal('event');
  document.getElementById('addBtn').onclick = () => openModal('event');
  document.getElementById('mobileAddBtn').onclick = () => openModal('event');

  // Quick add
  document.getElementById('quickSave').onclick = async () => {
    const input = document.getElementById('quickInput');
    const type = document.getElementById('quickType').value;
    if (!input.value.trim()) return;
    await addEntry({ type, title: input.value.trim(), content: '', entry_date: fmtDate(state.today) });
    input.value = '';
  };

  // Entry filter
  document.querySelectorAll('#entryFilter span').forEach(el => {
    el.addEventListener('click', () => {
      document.querySelectorAll('#entryFilter span').forEach(s => s.classList.remove('active'));
      el.classList.add('active');
      state.entryFilter = el.dataset.filter;
      renderEntries();
    });
  });

  // Calendar day click (mobile)
  document.addEventListener('click', (e) => {
    const pill = e.target.closest('.day-pill');
    if (pill && pill.dataset.date) {
      state.selectedDate = new Date(pill.dataset.date + 'T12:00:00');
      renderDayEvents();
      document.getElementById('selectedDayLabel').textContent = fmtDate(state.selectedDate);
    }
  });

  // Export
  document.getElementById('exportBtn').onclick = () => {
    const data = { events: state.events, projects: state.projects, goals: state.goals, entries: state.entries };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `commander-dashboard-${fmtDate(state.today)}.json`;
    a.click();
  };

  // Initial render with loading state
  render();
  loadAll();
});

console.log('🦞 主宰面板已加载');
</script>
</body>
</html>
