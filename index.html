<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>主宰面板</title>
<style>
/* ==================== RESET & BASE ==================== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:calc(100vw/375*16);touch-action:manipulation}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro","PingFang SC","Helvetica Neue",sans-serif;background:#0f0f13;color:#e8e8ed;line-height:1.5;-webkit-font-smoothing:antialiased;overflow-x:hidden}
:root{--bg:#0f0f13;--bg2:rgba(255,255,255,0.03);--bg3:rgba(255,255,255,0.04);--border:rgba(255,255,255,0.06);--text:#e8e8ed;--text2:#888;--text3:#555;--text4:#444;--accent:#5b9aff;--accent2:#2ed573;--accent3:#ff9f43;--accent4:#a078ff;--accent5:#ff6b6b;--radius:0.75rem}

/* ==================== MOBILE LAYOUT (default) ==================== */
.app{display:flex;min-height:100vh;min-height:100dvh;width:100%}

/* Sidebar: hidden on mobile */
.sidebar{display:none}
.desk-only{display:none!important}

/* Mobile header */
.mobile-header{display:flex;align-items:center;justify-content:space-between;padding:0.75rem 1rem 0.25rem;position:sticky;top:0;z-index:40;background:var(--bg)}
.mobile-header h1{font-size:1.15rem;font-weight:700;color:#fff;display:flex;align-items:center;gap:0.25rem}
.mobile-header .date{font-size:0.65rem;color:var(--text3)}
.mobile-header .actions{display:flex;gap:0.375rem}
.mobile-header .actions button{background:var(--bg3);border:1px solid var(--border);color:var(--text2);width:2rem;height:2rem;border-radius:0.5rem;font-size:0.85rem;cursor:pointer}

.main{flex:1;overflow-y:auto;padding:0.5rem 1rem 5.5rem;min-height:100vh;min-height:100dvh}

/* Tab bar */
.tab-bar{position:fixed;bottom:0;left:0;width:100%;background:rgba(15,15,19,0.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;padding:0.375rem 0 0.75rem;z-index:100}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:0.125rem;padding:0.25rem;background:none;border:none;color:var(--text3);font-size:0.625rem;cursor:pointer;transition:color 0.15s}
.tab-btn.active{color:var(--accent)}
.tab-btn .icon{font-size:1.25rem;line-height:1}
.tab-btn .label{font-weight:500}

/* Tab pages */
.tab-page{display:none}
.tab-page.active{display:block}

/* FAB */
.fab{position:fixed;bottom:4.5rem;right:1rem;width:2.75rem;height:2.75rem;border-radius:50%;background:var(--accent);border:none;color:#fff;font-size:1.5rem;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(91,154,255,0.3);cursor:pointer;z-index:50;transition:transform 0.15s}
.fab:active{transform:scale(0.92)}

/* ==================== MOBILE COMPONENTS ==================== */
.section-title{font-size:0.75rem;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.05em;margin:1.25rem 0 0.625rem;display:flex;align-items:center;gap:0.5rem}
.section-title::after{content:'';flex:1;height:1px;background:var(--border)}
.card{background:var(--bg3);border:1px solid var(--border);border-radius:0.75rem;padding:0.85rem;margin-bottom:0.625rem}

/* Calendar strip */
.cal-strip{display:flex;gap:0.375rem;overflow-x:auto;padding:0.5rem 0 0.75rem;-webkit-overflow-scrolling:touch}
.cal-strip::-webkit-scrollbar{display:none}
.day-pill{flex-shrink:0;width:2.5rem;padding:0.4rem 0;border-radius:0.5rem;text-align:center;background:var(--bg3);border:1px solid transparent;cursor:pointer}
.day-pill.today{background:rgba(91,154,255,0.15);border-color:var(--accent)}
.day-pill .dow{font-size:0.6rem;color:var(--text3)}
.day-pill.today .dow{color:var(--accent)}
.day-pill .dom{font-size:0.85rem;font-weight:600;color:var(--text2);margin-top:0.1rem}
.day-pill.today .dom{color:var(--text)}
.day-pill .dot{width:4px;height:4px;border-radius:50%;margin:0.15rem auto 0}
.day-pill .dot.has{background:var(--accent)}

/* Event items */
.event-item{display:flex;gap:0.75rem;align-items:flex-start;position:relative}
.event-item+.event-item{margin-top:0.75rem;padding-top:0.75rem;border-top:1px solid var(--border)}
.event-dot{width:0.5rem;height:0.5rem;border-radius:50%;margin-top:0.3rem;flex-shrink:0}
.event-body{flex:1;min-width:0}
.event-title{font-size:0.85rem;font-weight:500;color:var(--text)}
.event-desc{font-size:0.7rem;color:var(--text3);margin-top:0.125rem}
.event-completed{opacity:0.35;text-decoration:line-through}
.event-check{width:1.1rem;height:1.1rem;border-radius:50%;border:2px solid rgba(255,255,255,0.1);flex-shrink:0;margin-top:0.15rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
.event-check.done{background:var(--accent2);border-color:var(--accent2)}
.event-check.done::after{content:'\u2713';color:#fff;font-size:0.65rem;font-weight:700}

/* Projects grid */
.project-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.625rem}
.project-card{background:var(--bg3);border:1px solid var(--border);border-radius:0.75rem;padding:0.85rem}
.project-name{font-size:0.85rem;font-weight:600;color:var(--text);margin-bottom:0.3rem}
.project-tags{display:flex;gap:0.25rem;margin-bottom:0.5rem;flex-wrap:wrap}
.project-tag{font-size:0.6rem;padding:0.1rem 0.35rem;border-radius:0.25rem;font-weight:500}
.tag-work{background:rgba(91,154,255,0.12);color:var(--accent)}
.tag-life{background:rgba(46,213,115,0.12);color:var(--accent2)}
.tag-work{background:rgba(255,159,67,0.12);color:var(--accent3)}
.tag-think{background:rgba(160,120,255,0.12);color:var(--accent4)}
.tag-family{background:rgba(255,107,107,0.12);color:var(--accent5)}
.project-status{font-size:0.6rem;padding:0.1rem 0.35rem;border-radius:0.25rem;font-weight:500;display:inline-block;margin-bottom:0.4rem}
.status-planning{background:var(--bg3);color:var(--text2)}
.status-progress{background:rgba(91,154,255,0.15);color:var(--accent)}
.status-done{background:rgba(46,213,115,0.15);color:var(--accent2)}
.status-archived{background:rgba(255,255,255,0.05);color:var(--text3)}
.progress-bar{height:3px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:0.4rem}
.progress-fill{height:100%;border-radius:2px;transition:width 0.3s}

/* Goal items */
.goal-item{display:flex;gap:0.75rem;align-items:center}
.goal-item+.goal-item{margin-top:0.75rem;padding-top:0.75rem;border-top:1px solid var(--border)}
.goal-icon{width:2rem;height:2rem;border-radius:0.5rem;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0}
.goal-icon.long{background:rgba(160,120,255,0.15);color:var(--accent4)}
.goal-icon.short{background:rgba(91,154,255,0.15);color:var(--accent)}
.goal-info{flex:1;min-width:0}
.goal-title{font-size:0.85rem;font-weight:500;color:var(--text)}
.goal-meta{font-size:0.65rem;color:var(--text3);margin-top:0.1rem}
.goal-pct{width:4rem;flex-shrink:0;text-align:right}
.goal-pct .num{font-size:0.75rem;font-weight:600;color:var(--text3)}
.goal-pct .bar{height:3px;background:var(--border);border-radius:2px;margin-top:0.2rem;overflow:hidden}
.goal-pct .bar .fill{height:100%;border-radius:2px}

/* Entry items */
.entry-item{display:flex;gap:0.625rem}
.entry-item+.entry-item{margin-top:0.625rem;padding-top:0.625rem;border-top:1px solid var(--border)}
.entry-icon-lg{width:1.5rem;height:1.5rem;border-radius:0.375rem;display:flex;align-items:center;justify-content:center;font-size:0.75rem;flex-shrink:0;margin-top:0.1rem}
.entry-body{flex:1;min-width:0}
.entry-title{font-size:0.85rem;font-weight:500;color:var(--text)}
.entry-text{font-size:0.72rem;color:var(--text3);margin-top:0.1rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.entry-date{font-size:0.6rem;color:var(--text4);margin-top:0.15rem}
.entry-filter{display:flex;gap:0.375rem;margin-bottom:0.75rem;flex-wrap:wrap}
.entry-filter span{font-size:0.65rem;padding:0.15rem 0.4rem;border-radius:1rem;background:var(--bg3);color:var(--text3);cursor:pointer}
.entry-filter span.active{background:rgba(160,120,255,0.12);color:var(--accent4);font-weight:500}

/* Loading / Empty / Error */
.loading{text-align:center;padding:1.5rem;color:var(--text4);font-size:0.78rem}
.spinner{display:inline-block;width:1.2rem;height:1.2rem;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.6s linear infinite;margin-bottom:0.5rem}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-state{text-align:center;padding:1.5rem 1rem;color:var(--text4);font-size:0.78rem}
.empty-state .icon{font-size:2rem;margin-bottom:0.5rem;opacity:0.3}
.error-msg{text-align:center;padding:1.5rem;color:var(--accent5);font-size:0.78rem}
.error-msg .detail{font-size:0.65rem;color:var(--text4);margin-top:0.25rem;word-break:break-all}

/* Modal */
.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:200;display:none;align-items:flex-end;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:#1a1a20;border-radius:1rem 1rem 0 0;width:100%;max-width:430px;max-height:80vh;overflow-y:auto;padding:1rem;animation:slideUp 0.2s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:0.75rem;padding-bottom:0.5rem;border-bottom:1px solid var(--border)}
.modal-title{font-size:0.9rem;font-weight:600}
.modal-close{background:none;border:none;color:var(--text3);font-size:1.2rem;cursor:pointer;padding:0.25rem}
.modal form{display:flex;flex-direction:column;gap:0.5rem}
.modal label{font-size:0.7rem;color:var(--text3);font-weight:500}
.modal input,.modal select,.modal textarea{background:var(--bg3);border:1px solid var(--border);border-radius:0.5rem;padding:0.5rem;color:var(--text);font-size:0.82rem;outline:none;width:100%}
.modal input:focus,.modal select:focus,.modal textarea:focus{border-color:var(--accent)}
.modal textarea{resize:vertical;min-height:3rem}
.modal .form-row{display:flex;gap:0.5rem}
.modal .form-row>*{flex:1}
.modal .btn-submit{background:var(--accent);border:none;color:#fff;padding:0.55rem;border-radius:0.5rem;font-size:0.85rem;cursor:pointer;margin-top:0.25rem;font-weight:500}

/* Quick add */
.quick-add{display:flex;gap:0.375rem;padding:0.4rem 0}
.quick-add input{flex:1;min-width:0;background:var(--bg3);border:1px solid var(--border);border-radius:0.375rem;padding:0.35rem 0.5rem;color:var(--text);font-size:0.75rem;outline:none}
.quick-add select{background:var(--bg3);border:1px solid var(--border);border-radius:0.375rem;padding:0.35rem 0.5rem;color:var(--text);font-size:0.75rem;outline:none;width:4.5rem}
.quick-add button{background:var(--accent);border:none;color:#fff;padding:0.35rem 0.65rem;border-radius:0.375rem;font-size:0.72rem;cursor:pointer;white-space:nowrap}

/* Stats mini */
.stats-row{display:flex;gap:1rem;text-align:center;padding:0.5rem 0}
.stats-row .stat{flex:1;background:var(--bg2);border-radius:0.5rem;padding:0.75rem}
.stats-row .stat .num{font-size:1.2rem;font-weight:700;color:var(--accent)}
.stats-row .stat .num.green{color:var(--accent2)}
.stats-row .stat .num.orange{color:var(--accent3)}
.stats-row .stat .lbl{font-size:0.6rem;color:var(--text3);margin-top:0.2rem}

/* ==================== DESKTOP LAYOUT (>=768px) ==================== */
@media(min-width:768px){
  html{font-size:16px}
  
  /* Hide mobile */
  .mobile-header{display:none!important}
  .tab-bar{display:none!important}
  .fab{display:none!important}
  .tab-page{display:none!important}
  .mob-only{display:none!important}
  .desk-only{display:initial!important}
  
  /* Show sidebar */
  .sidebar{width:220px;border-right:1px solid var(--border);padding:1.5rem 0.75rem;flex-shrink:0;display:flex;flex-direction:column}
  .sidebar .logo{font-size:1.2rem;font-weight:700;color:#fff;padding:0 0.75rem 1.5rem;display:flex;align-items:center;gap:0.375rem}
  .sidebar .logo span{font-size:0.8rem;color:var(--text3);font-weight:400}
  .sidebar nav{display:flex;flex-direction:column;gap:0.125rem;flex:1}
  .nav-item{display:flex;align-items:center;gap:0.5rem;padding:0.5rem 0.75rem;border-radius:0.5rem;font-size:0.85rem;color:var(--text3);cursor:pointer;transition:all 0.12s;background:none;border:none;text-align:left;width:100%}
  .nav-item:hover{background:var(--bg3);color:var(--text2)}
  .nav-item.active{background:rgba(91,154,255,0.1);color:var(--accent);font-weight:500}
  .nav-item .badge{margin-left:auto;font-size:0.65rem;background:rgba(91,154,255,0.15);color:var(--accent);padding:0.1rem 0.4rem;border-radius:0.75rem;font-weight:500}
  .nav-divider{height:1px;background:var(--border);margin:0.5rem 0.75rem}
  
  /* Main */
  .app{display:flex;min-height:100vh}
  .main{flex:1;overflow-y:auto;padding:1.5rem 2rem}
  
  /* Top bar */
  .top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem}
  .top-bar .greeting{font-size:1.25rem;font-weight:600;color:#fff}
  .top-bar .greeting small{font-size:0.75rem;color:var(--text3);font-weight:400;margin-left:0.75rem}
  .top-bar .actions{display:flex;gap:0.5rem}
  .top-bar .btn{background:var(--bg3);border:1px solid var(--border);color:var(--text2);padding:0.4rem 0.85rem;border-radius:0.5rem;font-size:0.8rem;cursor:pointer;transition:background 0.12s}
  .top-bar .btn:hover{background:rgba(91,154,255,0.12);color:var(--accent)}
  .top-bar .btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
  .top-bar .btn.primary:hover{background:#4a89f0}
  
  /* Dashboard grid */
  .dash-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem}
  @media(max-width:1100px){.dash-grid{grid-template-columns:1fr 1fr}}
  .dash-col{display:flex;flex-direction:column;gap:0.75rem}
  
  /* Panel cards */
  .panel{background:var(--bg3);border:1px solid var(--border);border-radius:0.75rem;overflow:hidden}
  .panel-header{display:flex;align-items:center;justify-content:space-between;padding:0.75rem 1rem 0.5rem}
  .panel-title{font-size:0.7rem;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.05em}
  .panel-action{font-size:0.65rem;color:var(--accent);cursor:pointer;background:none;border:none}
  .panel-body{padding:0 1rem 0.75rem}
  
  /* Mini calendar */
  .mini-cal{display:flex;gap:0.25rem}
  .mini-day{flex:1;text-align:center;padding:0.3rem 0;border-radius:0.375rem}
  .mini-day .dow{font-size:0.6rem;color:var(--text3)}
  .mini-day .num{font-size:0.8rem;font-weight:500;color:var(--text2);margin-top:0.1rem}
  .mini-day.today{background:rgba(91,154,255,0.12)}
  .mini-day.today .num{color:var(--accent);font-weight:600}
  .mini-day.today .dow{color:var(--accent)}
  
  /* Event rows in panel */
  .event-row{display:flex;gap:0.5rem;padding:0.375rem 0;align-items:flex-start}
  .event-row+.event-row{border-top:1px solid var(--border)}
  .event-row .edot{width:6px;height:6px;border-radius:50%;margin-top:0.35rem;flex-shrink:0}
  .event-row .einfo{flex:1}
  .event-row .einfo .etitle{font-size:0.8rem;color:var(--text)}
  .event-row .einfo .emeta{font-size:0.65rem;color:var(--text3);margin-top:0.05rem}
  
  /* Project mini */
  .proj-mini{display:flex;gap:0.75rem;padding:0.5rem 0;align-items:center}
  .proj-mini+.proj-mini{border-top:1px solid var(--border)}
  .proj-mini-info{flex:1;min-width:0}
  .proj-mini-name{font-size:0.8rem;font-weight:500;color:var(--text)}
  .proj-mini-progress{width:4rem;text-align:right}
  .proj-mini-progress .pct{font-size:0.7rem;font-weight:600;color:var(--text3)}
  .proj-mini-progress .bar{height:3px;background:var(--border);border-radius:2px;margin-top:0.15rem;overflow:hidden}
  .proj-mini-progress .bar .fill{height:100%;border-radius:2px}
  
  /* Goal mini */
  .goal-mini{display:flex;gap:0.5rem;padding:0.5rem 0;align-items:center}
  .goal-mini+.goal-mini{border-top:1px solid var(--border)}
  .goal-mini-icon{width:1.5rem;height:1.5rem;border-radius:0.375rem;display:flex;align-items:center;justify-content:center;font-size:0.7rem;flex-shrink:0}
  .goal-mini-icon.long{background:rgba(160,120,255,0.12);color:var(--accent4)}
  .goal-mini-icon.short{background:rgba(91,154,255,0.12);color:var(--accent)}
  .goal-mini-body{flex:1;min-width:0}
  .goal-mini-title{font-size:0.8rem;color:var(--text)}
  .goal-mini-meta{font-size:0.6rem;color:var(--text4);margin-top:0.05rem}
  .goal-mini-pct{font-size:0.75rem;font-weight:600;color:var(--text3);min-width:2.5rem;text-align:right}
  
  /* Entry mini */
  .entry-mini{display:flex;gap:0.5rem;padding:0.5rem 0;align-items:flex-start}
  .entry-mini+.entry-mini{border-top:1px solid var(--border)}
  .entry-mini-icon{width:1.25rem;height:1.25rem;border-radius:0.3rem;display:flex;align-items:center;justify-content:center;font-size:0.6rem;flex-shrink:0;margin-top:0.05rem}
  .entry-mini-body{flex:1;min-width:0}
  .entry-mini-title{font-size:0.8rem;color:var(--text)}
  .entry-mini-text{font-size:0.65rem;color:var(--text3);margin-top:0.05rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .entry-mini-date{font-size:0.55rem;color:var(--text4);margin-top:0.1rem}
  
  /* Stats in panel */
  .panel-stats{display:flex;gap:1rem;text-align:center;padding:0.25rem 0}
  .panel-stats .stat{flex:1;background:var(--bg2);border-radius:0.5rem;padding:0.75rem}
  .panel-stats .stat .num{font-size:1.2rem;font-weight:700;color:var(--accent)}
  .panel-stats .stat .num.green{color:var(--accent2)}
  .panel-stats .stat .num.orange{color:var(--accent3)}
  .panel-stats .stat .lbl{font-size:0.55rem;color:var(--text4);margin-top:0.1rem}
  
  /* Modal mid-screen */
  .modal-overlay{align-items:center}
  .modal{border-radius:1rem}
}
</style>
</head>
<body>
<div class="app">

  <!-- ===== DESKTOP SIDEBAR ===== -->
  <aside class="sidebar">
    <div class="logo">🦞 主宰 <span>面板</span></div>
    <nav>
      <button class="nav-item active" data-tab="today">📋 概览</button>
      <button class="nav-item" data-tab="calendar">📅 日历</button>
      <button class="nav-item" data-tab="projects">📊 项目 <span class="badge" id="pBadge">0</span></button>
      <button class="nav-item" data-tab="goals">🎯 目标 <span class="badge" id="gBadge">0</span></button>
      <button class="nav-item" data-tab="library">📚 库</button>
      <div class="nav-divider"></div>
      <button class="nav-item" id="exportBtn">📥 导出备份</button>
    </nav>
  </aside>

  <!-- ===== MOBILE HEADER ===== -->
  <div class="mobile-header">
    <h1>🦞 主宰 <span class="date" id="mDate"></span></h1>
    <div class="actions"><button id="mAddBtn">＋</button></div>
  </div>

  <div class="main">

    <!-- ===== DESKTOP TOP BAR ===== -->
    <div class="top-bar desk-only">
      <div class="greeting" id="greeting">加载中...</div>
      <div class="actions"><button class="btn primary" id="addBtn">＋ 添加事项</button></div>
    </div>

    <!-- ===== DESKTOP DASHBOARD ===== -->
    <div class="dash-grid desk-only" id="dashGrid">
      <!-- Col 1 -->
      <div class="dash-col">
        <div class="panel">
          <div class="panel-header"><span class="panel-title">📅 本周</span></div>
          <div class="panel-body" id="dCal"><div class="loading"><div class="spinner"></div></div></div>
        </div>
        <div class="panel">
          <div class="panel-header"><span class="panel-title">📋 今日待办</span> <button class="panel-action" onclick="openModal('event')">+</button></div>
          <div class="panel-body" id="dToday"><div class="loading"><div class="spinner"></div></div></div>
        </div>
      </div>
      <!-- Col 2 -->

<script>
// ==================== SUPABASE REST CLIENT ====================
var SB_URL = 'https://pkxmsfyzcphzvuangrzs.supabase.co';
var SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBreG1zZnl6Y3BoenZ1YW5ncnpzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwNDkxNzcsImV4cCI6MjA5NDYyNTE3N30.K1_niR4ZylqzbDPFnmTs5HRo2aEbObkGw3V9clM1czo';

function api(method, table, params, body) {
  var url = SB_URL + '/rest/v1/' + table;
  if (params) url += '?' + params;
  return fetch(url, {
    method: method,
    headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json' },
    body: body ? JSON.stringify(body) : null
  });
}

// ==================== STATE ====================
var S = {
  events: [], projects: [], goals: [], entries: [],
  today: new Date(), selDate: new Date(),
  curTab: 'today', eFilter: 'all', loaded: false, err: null
};
var D = 86400000;

function fmt(d) { var y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,'0'), dd=String(d.getDate()).padStart(2,'0'); return y+'-'+m+'-'+dd; }
function isT(d) { var t=S.today; return d.getFullYear()===t.getFullYear()&&d.getMonth()===t.getMonth()&&d.getDate()===t.getDate(); }
function dow(d) { return ['日','一','二','三','四','五','六'][d.getDay()]; }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ==================== DATA ====================
async function loadAll() {
  S.err = null;
  try {
    var r = await Promise.all([
      api('GET','calendar_events?order=event_date').then(function(r){if(!r.ok)throw Error(r.status);return r.json();}),
      api('GET','projects?order=created_at').then(function(r){if(!r.ok)throw Error(r.status);return r.json();}),
      api('GET','goals?order=created_at').then(function(r){if(!r.ok)throw Error(r.status);return r.json();}),
      api('GET','entries?order=created_at.desc&limit=50').then(function(r){if(!r.ok)throw Error(r.status);return r.json();})
    ]);
    S.events=r[0]||[]; S.projects=r[1]||[]; S.goals=r[2]||[]; S.entries=r[3]||[];
  } catch(e) { S.err=e.message; }
  S.loaded = true;
  renderAll();
}

async function crudInsert(table, data) {
  var r = await api('POST', table, null, data);
  if (!r.ok) { var t = await r.text(); alert('操作失败: '+t); return false; }
  return true;
}
async function crudUpdate(table, id, data) { await api('PATCH', table+'?id=eq.'+id, null, data); }

async function addEvent(d) { if(await crudInsert('calendar_events',d)) await loadAll(); }
async function updateEvent(id,d) { await crudUpdate('calendar_events',id,d); await loadAll(); }
async function addProject(d) { if(d.tags&&typeof d.tags==='string') d.tags=d.tags.split(',').map(function(t){return t.trim()}).filter(Boolean); d.progress=parseInt(d.progress)||0; if(await crudInsert('projects',d)) await loadAll(); }
async function addGoal(d) { d.progress=parseInt(d.progress)||0; if(await crudInsert('goals',d)) await loadAll(); }
async function addEntry(d) { d.entry_date=fmt(S.today); if(await crudInsert('entries',d)) await loadAll(); }

// ==================== RENDER ====================
function renderAll() {

  renderGoals();

  rDashProj();
  rDashGoal();

  rDashStat();
}

function renderCal() {
  var h='';
  for(var i=-1;i<=6;i++){var d=new Date(S.today.getTime()+i*D);var c=isT(d)?'today':'';var dot=S.events.some(function(e){return e.event_date===fmt(d)})?'<div class="dot has"></div>':'<div class="dot"></div>';h+='<div class="day-pill '+c+'" data-d="'+fmt(d)+'"><div class="dow">'+dow(d)+'</div><div class="dom">'+d.getDate()+'</div>'+dot+'</div>';}
  document.getElementById('calStrip').innerHTML=h;
  document.getElementById('calStripFull').innerHTML=h;
}

// Events
function evtHtml(items) {
  if(!items||!items.length)return'<div class="empty-state"><div class="icon">📭</div><div class="msg">暂无事项</div></div>';
  return items.map(function(e){
    var c=e.event_type==='appointment'?'#ff9f43':e.event_type==='reminder'?'#2ed573':'#5b9aff';
    return'<div class="card"><div class="event-item'+(e.completed?' event-completed':'')+'"><div class="event-dot" style="background:'+c+'"></div><div class="event-body"><div class="event-title'+(e.completed?' event-completed':'')+'">'+esc(e.title)+'</div><div class="event-desc'+(e.completed?' event-completed':'')+'">'+(e.start_time||'')+(e.start_time&&e.description?' · ':'')+esc(e.description||'')+'</div></div><div class="event-check'+(e.completed?' done':'')+'" onclick="tog(\''+e.id+'\','+(e.completed?'false':'true')+')"></div></div></div>';
  }).join('');
}

function renderEvents() {
  var ts=fmt(S.today);
  document.getElementById('todayEvents').innerHTML=evtHtml(S.events.filter(function(e){return e.event_date===ts}).sort(function(a,b){return(a.start_time||'')>(b.start_time||'')?1:-1;}));

  document.getElementById('weekEvents').innerHTML=evtHtml(S.events.filter(function(e){return e.event_date>ts&&e.event_date<=we}));

  document.getElementById('dayEvents').innerHTML=evtHtml(S.events.filter(function(e){return e.event_date===s}).sort(function(a,b){return(a.start_time||'')>(b.start_time||'')?1:-1;}));

function renderProj() {

  el.innerHTML=S.projects.map(function(p){

  }).join('');
}

// Goals
function renderGoals() {
  ['long','short'].forEach(function(type){
    var el=document.getElementById(type==='long'?'longGoals':'shortGoals');
    var items=S.goals.filter(function(g){return g.type===(type==='long'?'long_term':'short_term');});

    }).join('');
  });
}

function switchTab(t) {
  S.curTab=t;

  document.querySelectorAll('.tab-btn').forEach(function(el){el.classList.remove('active');});

  document.querySelectorAll('[data-tab="'+t+'"]').forEach(function(el){el.classList.add('active');});

window.tog=function(id,v){updateEvent(id,{completed:v});};

function openModal(type) {
  var o=document.getElementById('modalOverlay'), t=document.getElementById('modalTitle'), f=document.getElementById('modalForm');
  var cf={
    event:{title:'📅 添加事项',fields:'<label>标题</label><input name="title" required placeholder="事项名称"><div class="form-row"><div><label>日期</label><input name="event_date" type="date" value="'+fmt(S.selDate)+'"></div><div><label>时间</label><input name="start_time" type="time"></div></div><label>类型</label><select name="event_type"><option value="task">任务</option><option value="appointment">预约</option><option value="reminder">提醒</option></select><label>备注</label><textarea name="description"></textarea><button class="btn-submit" type="submit">保存</button>',sub:function(d){return addEvent(d);}},
    project:{title:'📊 新建项目',fields:'<label>项目名</label><input name="name" required placeholder="项目名称"><div class="form-row"><div><label>状态</label><select name="status"><option value="planning">规划中</option><option value="in_progress" selected>进行中</option><option value="completed">已完成</option><option value="archived">已归档</option></select></div><div><label>进度 %</label><input name="progress" type="number" min="0" max="100" value="0"></div></div><label>标签（逗号分隔）</label><input name="tags" placeholder="工作,个人,务虚,家庭"><label>描述</label><textarea name="description"></textarea><button class="btn-submit" type="submit">保存</button>',sub:function(d){return addProject(d);}},
    goal:{title:'🎯 新建目标',fields:'<label>标题</label><input name="title" required placeholder="目标名称"><div class="form-row"><div><label>类型</label><select name="type"><option value="long_term">长期</option><option value="short_term" selected>短期</option></select></div><div><label>截止日期</label><input name="due_date" type="date"></div></div><label>进度 %</label><input name="progress" type="number" min="0" max="100" value="0"><label>描述</label><textarea name="description"></textarea><button class="btn-submit" type="submit">保存</button>',sub:function(d){return addGoal(d);}},
    entry:{title:'📚 记录',fields:'<label>类型</label><select name="type"><option value="thought">💭 思考</option><option value="action">✅ 行动</option><option value="plan">🗓️ 规划</option></select><label>标题</label><input name="title" required placeholder="标题"><label>内容</label><textarea name="content" rows="3"></textarea><button class="btn-submit" type="submit">保存</button>',sub:function(d){return addEntry(d);}}
  };
  var c=cf[type];if(!c)return;
  t.textContent=c.title;f.innerHTML=c.fields;o.classList.add('show');
  f.onsubmit=function(e){e.preventDefault();var fd=new FormData(f),obj={};fd.forEach(function(v,k){obj[k]=v;});var p=c.sub(obj);if(p&&p.then)p.then(function(){o.classList.remove('show');});else o.classList.remove('show');};

  document.querySelectorAll('.nav-item[data-tab]').forEach(function(b){b.addEventListener('click',function(){switchTab(this.dataset.tab);});});
  document.getElementById('fab').onclick=function(){openModal('event');};
  document.getElementById('addBtn').onclick=function(){openModal('event');};
  document.getElementById('mAddBtn').onclick=function(){openModal('event');};
  document.getElementById('qSave').onclick=function(){var inp=document.getElementById('qInput'),t=document.getElementById('qType').value;if(!inp.value.trim())return;addEntry({type:t,title:inp.value.trim(),content:''});inp.value='';};
  document.querySelectorAll('#entryFilter span').forEach(function(el){el.addEventListener('click',function(){document.querySelectorAll('#entryFilter span').forEach(function(s){s.classList.remove('active');});this.classList.add('active');S.eFilter=this.dataset.f;renderEntries();});});
  document.addEventListener('click',function(e){var p=e.target.closest('.day-pill');if(p&&p.dataset.d){S.selDate=new Date(p.dataset.d+'T12:00:00');renderEvents();document.getElementById('selDay').textContent='📅 '+p.dataset.d;}});
  document.getElementById('modalClose').onclick=function(){document.getElementById('modalOverlay').classList.remove('show');};
  document.getElementById('modalOverlay').onclick=function(e){if(e.target===this)this.classList.remove('show');};
  document.getElementById('exportBtn').onclick=function(){var blob=new Blob([JSON.stringify({events:S.events,projects:S.projects,goals:S.goals,entries:S.entries},null,2)],{type:'application/json'});var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='dashboard-'+fmt(S.today)+'.json';a.click();};
  loadAll();
});
</script>
</body>
</html>
