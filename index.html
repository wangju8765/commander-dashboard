<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>主宰面板</title>
<meta name="version" content="0.3.0">
<style>
/* ===== RESET ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;touch-action:manipulation}
html{height:100%;overflow:hidden;overscroll-behavior:none}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro","PingFang SC","Helvetica Neue",sans-serif;background:#0f0f13;color:#e8e8ed;line-height:1.5;-webkit-font-smoothing:antialiased;height:100%;overflow:hidden;overscroll-behavior:none}
.app{width:100%;height:100%;height:100dvh;overflow:hidden}
</style>
<!-- ===== MOBILE CSS ===== -->
<style>
@media(max-width:767px){
html{font-size:calc(100vw/375*16);touch-action:manipulation}
body{background:#0f0f13;color:#e8e8ed}
.app{display:flex;flex-direction:column;height:100vh;height:100dvh}
#mobileView{display:flex;flex-direction:column;flex:1;overflow:hidden}

/* Header */
.header{padding:calc(1.25rem + env(safe-area-inset-top,0px)) 1rem 0.5rem;background:#0f0f13;position:sticky;top:0;z-index:10}
.header h1{font-size:1.5rem;font-weight:700;color:#fff;display:flex;align-items:center;gap:0.375rem}
.header h1 span{font-size:1rem;color:#999}
.header .date{font-size:0.75rem;color:#888;margin-top:0.125rem}
.main{flex:1;padding:0.5rem 1rem 6rem;overflow-y:auto;-webkit-overflow-scrolling:touch;touch-action:pan-y;overscroll-behavior:contain}

/* Section titles */
.section-title{font-size:0.75rem;font-weight:600;color:#999;text-transform:uppercase;letter-spacing:0.05em;margin:1.25rem 0 0.625rem;display:flex;align-items:center;gap:0.5rem}
.section-title::after{content:'';flex:1;height:1px;background:rgba(255,255,255,0.06)}

/* Cards */
.card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);border-radius:0.75rem;padding:0.85rem;margin-bottom:0.625rem}

/* Calendar strip */
.calendar-strip{display:flex;gap:0.375rem;overflow-x:auto;padding:0.5rem 0 0.75rem;-webkit-overflow-scrolling:touch}
.calendar-strip::-webkit-scrollbar{display:none}
.day-pill{flex-shrink:0;width:3rem;padding:0.45rem 0;border-radius:0.625rem;text-align:center;background:rgba(255,255,255,0.04);border:1px solid transparent;cursor:pointer;-webkit-font-smoothing:antialiased}
.day-pill.today{background:rgba(91,154,255,0.1);border-color:rgba(91,154,255,0.3)}
.day-pill.selected{background:rgba(91,154,255,0.2);border-color:#5b9aff;box-shadow:0 0 0 1px rgba(91,154,255,0.4)}
.day-pill .dow{font-size:0.7rem;color:#888;font-weight:500}
.day-pill.today .dow{color:#5b9aff;font-weight:600}
.day-pill.selected .dow{color:#5b9aff;font-weight:600}
.day-pill .dom{font-size:1.05rem;font-weight:700;color:#aaa;margin-top:0.125rem}
.day-pill.today .dom{color:#e8e8ed}
.day-pill.selected .dom{color:#fff}
.day-pill .time-bar{height:3px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden;margin:0.15rem 0.3rem 0;position:relative}
.day-pill .time-fill{position:absolute;top:0;height:100%;border-radius:2px}
/* Event item */
.event-item{display:flex;gap:0.75rem;align-items:flex-start;position:relative}
.event-item+.event-item{margin-top:0.75rem;padding-top:0.75rem;border-top:1px solid rgba(255,255,255,0.04)}
.event-dot{width:0.5rem;height:0.5rem;border-radius:50%;margin-top:0.3rem;flex-shrink:0}
.event-body{flex:1;min-width:0}
.event-title{font-size:0.85rem;font-weight:500;color:#e8e8ed}
.event-desc{font-size:0.7rem;color:#888;margin-top:0.125rem}
.event-item.past .event-title{color:#666;text-decoration:line-through}
.event-item.past .event-desc{color:#666}
.event-item{cursor:pointer}
.event-item:active{background:rgba(255,255,255,0.04);border-radius:0.5rem;margin:-0.5rem;padding:0.5rem}

/* Projects grid */
.project-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.625rem}
.project-card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);border-radius:0.75rem;padding:0.85rem}
.project-card:active{background:rgba(255,255,255,0.08)}
.project-name{font-size:0.85rem;font-weight:600;color:#e8e8ed;margin-bottom:0.3rem}
.project-tags{display:flex;gap:0.25rem;margin-bottom:0.5rem;flex-wrap:wrap}
.project-tag{font-size:0.6rem;padding:0.1rem 0.35rem;border-radius:0.25rem;font-weight:500}
.tag-work{background:rgba(91,154,255,0.12);color:#5b9aff}
.tag-life{background:rgba(46,213,115,0.12);color:#2ed573}
.tag-think{background:rgba(160,120,255,0.12);color:#a078ff}
.tag-family{background:rgba(255,107,107,0.12);color:#ff6b6b}
.project-status{font-size:0.6rem;padding:0.1rem 0.35rem;border-radius:0.25rem;font-weight:500;display:inline-block;margin-bottom:0.4rem}
.status-planning{background:rgba(255,255,255,0.08);color:#aaa}
.status-progress{background:rgba(91,154,255,0.15);color:#5b9aff}
.status-done{background:rgba(46,213,115,0.15);color:#2ed573}
.status-archived{background:rgba(255,255,255,0.05);color:#888}
.progress-bar{height:3px;background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden;margin-top:0.4rem}
.progress-fill{height:100%;border-radius:2px;transition:width 0.3s}

/* Goal item */
.goal-item{display:flex;gap:0.75rem;align-items:center}
.goal-item+.goal-item{margin-top:0.75rem;padding-top:0.75rem;border-top:1px solid rgba(255,255,255,0.04)}
.goal-icon{width:2rem;height:2rem;border-radius:0.5rem;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0}
.goal-icon.long{background:rgba(160,120,255,0.15);color:#a078ff}
.goal-icon.short{background:rgba(91,154,255,0.15);color:#5b9aff}
.goal-info{flex:1;min-width:0}
.goal-title{font-size:0.85rem;font-weight:500;color:#e8e8ed}
.goal-meta{font-size:0.65rem;color:#888;margin-top:0.1rem}
.goal-pct{width:4rem;flex-shrink:0;text-align:right}
.goal-pct .num{font-size:0.75rem;font-weight:600;color:#999}
.goal-pct .bar{height:3px;background:rgba(255,255,255,0.08);border-radius:2px;margin-top:0.2rem;overflow:hidden}
.goal-pct .bar .fill{height:100%;border-radius:2px}

/* Entry item */
.entry-item{display:flex;gap:0.625rem}
.entry-item+.entry-item{margin-top:0.625rem;padding-top:0.625rem;border-top:1px solid rgba(255,255,255,0.04)}
.entry-icon-lg{width:1.5rem;height:1.5rem;border-radius:0.375rem;display:flex;align-items:center;justify-content:center;font-size:0.75rem;flex-shrink:0;margin-top:0.1rem}
.entry-body{flex:1;min-width:0}
.entry-title{font-size:0.85rem;font-weight:500;color:#e8e8ed}
.entry-text{font-size:0.72rem;color:#888;margin-top:0.1rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.entry-date{font-size:0.6rem;color:#666;margin-top:0.15rem}
.entry-filter{display:flex;gap:0.375rem;margin-bottom:0.75rem;flex-wrap:wrap}
.entry-filter span{font-size:0.7rem;padding:0.2rem 0.5rem;border-radius:1rem;background:rgba(255,255,255,0.04);color:#888;font-weight:500;cursor:pointer}
.entry-filter span.active{background:rgba(160,120,255,0.12);color:#a078ff;font-weight:500}

/* Tab content */
.tab-content{display:none}
.tab-content.active{display:block}

/* FAB */
.fab{position:fixed;bottom:calc(6rem + env(safe-area-inset-bottom,0px));right:1rem;width:2.75rem;height:2.75rem;border-radius:50%;background:#5b9aff;border:none;color:#fff;font-size:1.5rem;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(91,154,255,0.3);cursor:pointer;z-index:150;transition:transform 0.15s}
.fab:active{transform:scale(0.92)}

/* Tab bar */
.tab-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(15,15,19,0.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid rgba(255,255,255,0.06);display:flex;padding:0.375rem 0;z-index:100;padding-bottom:calc(0.375rem + env(safe-area-inset-bottom,0px))}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:0.125rem;padding:0.25rem;background:none;border:none;color:#888;font-size:0.625rem;cursor:pointer;transition:color 0.15s}
.tab-btn.active{color:#5b9aff}
.tab-btn .icon{font-size:1.25rem;line-height:1}
.tab-btn .label{font-weight:500}

/* Modal overrides */
.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:200;display:none;align-items:flex-end;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:#1a1a20;border-radius:1rem 1rem 0 0;width:100%;max-width:430px;max-height:75vh;overflow-y:auto;padding:1rem;animation:slideUp 0.2s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:0.75rem;padding-bottom:0.5rem;border-bottom:1px solid rgba(255,255,255,0.06)}
.modal-title{font-size:0.9rem;font-weight:600}
.modal-close{background:none;border:none;color:#888;font-size:1.2rem;cursor:pointer;padding:0.25rem}
.modal form{display:flex;flex-direction:column;gap:0.5rem}
.modal label{font-size:0.7rem;color:#888;font-weight:500}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:0.75rem;padding-bottom:0.5rem;border-bottom:1px solid rgba(255,255,255,0.06)}
.modal-title{font-size:0.9rem;font-weight:600}
.modal-close{background:none;border:none;color:#888;font-size:1.2rem;cursor:pointer;padding:0.25rem}
.modal form{display:flex;flex-direction:column;gap:0.5rem}
.modal label{font-size:0.7rem;color:#888;font-weight:500}
.modal input,.modal select,.modal textarea{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);border-radius:0.5rem;padding:0.5rem;color:#e8e8ed;font-size:0.82rem;outline:none;width:100%}
.modal input:focus,.modal select:focus,.modal textarea:focus{border-color:#5b9aff}
.modal textarea{resize:vertical;min-height:3rem}
.modal .form-row{display:flex;gap:0.5rem}
.modal .form-row>*{flex:1}
.modal .form-row .date-field{flex:2.5}
.modal .form-row .time-field{flex:1}
.modal .form-row .date-field input{white-space:nowrap}
.modal select{min-height:2.2rem}
.modal .input-error{border-color:#ff6b6b!important}
.modal .field-error{font-size:0.65rem;color:#ff6b6b;margin-top:0.125rem}
.modal .form-error{background:rgba(255,107,107,0.1);border:1px solid rgba(255,107,107,0.2);border-radius:0.5rem;padding:0.5rem;font-size:0.72rem;color:#ff6b6b;margin-bottom:0.5rem;display:none}
.modal .btn-submit{background:#5b9aff;border:none;color:#fff;padding:0.55rem;border-radius:0.5rem;font-size:0.85rem;cursor:pointer;margin-top:0.25rem;font-weight:500}

/* Detail modal */
.detail-body{padding:0 0 0.5rem}
.detail-body .detail-title{font-size:1.1rem;font-weight:600;color:#fff;margin-bottom:0.25rem}
.detail-body .detail-meta{font-size:0.72rem;color:#888;margin-bottom:0.75rem}
.detail-body .detail-desc{font-size:0.8rem;color:#aaa;margin-bottom:0.75rem;line-height:1.5}
/* Detail HTML (AI-generated rich layout) */
.detail-html{font-size:0.85rem;color:#e8e8ed;line-height:1.6}
.detail-html .detail-pack{margin-bottom:1rem}
.detail-html .detail-pack-row{display:flex;flex-wrap:wrap;gap:0.375rem;margin-bottom:0.375rem}
.detail-html .detail-pack-row:last-child{margin-bottom:0}
.detail-html .detail-pack-tag{display:inline-flex;align-items:center;gap:0.25rem;padding:0.375rem 0.625rem;border-radius:1rem;font-size:0.75rem;font-weight:500;cursor:pointer;border:1px solid;transition:all 0.15s;user-select:none}
.detail-html .detail-pack-tag.must{background:rgba(90,155,255,0.12);border-color:rgba(90,155,255,0.25);color:#5b9aff}
.detail-html .detail-pack-tag.suggest{background:rgba(255,159,67,0.1);border-color:rgba(255,159,67,0.2);color:#ff9f43}
.detail-html .detail-pack-tag.done{background:rgba(46,213,115,0.12);border-color:rgba(46,213,115,0.25);color:#2ed573}
.detail-html .detail-pack-tag.done::after{content:' \2713';font-weight:700}
.detail-html .detail-tl{position:relative;padding-left:1.25rem}
.detail-html .detail-tl::before{content:'';position:absolute;left:0.375rem;top:0.5rem;bottom:0.5rem;width:2px;background:rgba(255,255,255,0.06)}
.detail-html .detail-tl-item{position:relative;padding-bottom:0.75rem}
.detail-html .detail-tl-item:last-child{padding-bottom:0}
.detail-html .detail-tl-dot{position:absolute;left:-1.05rem;top:0.2rem;width:0.625rem;height:0.625rem;border-radius:50%;border:2px solid #0f0f13}
.detail-html .detail-tl-dot.train{background:#5b9aff}
.detail-html .detail-tl-dot.location{background:#a078ff}
.detail-html .detail-tl-dot.home{background:#2ed573}
.detail-html .detail-tl-dot.suggest{background:#ff9f43}
.detail-html .detail-tl-time{font-size:0.9rem;font-weight:700;color:#fff;margin-bottom:0.125rem;letter-spacing:0.02em}
.detail-html .detail-tl-main{font-size:0.85rem;font-weight:600;color:#e8e8ed;margin-bottom:0.125rem}
.detail-html .detail-tl-sub{font-size:0.85rem;font-weight:500;color:#ccc;margin-bottom:0.125rem}
.detail-html .detail-tl-suggest{font-size:0.85rem;font-weight:500;color:#ff9f43;margin-top:0.25rem;padding:0.5rem 0.625rem;background:rgba(255,159,67,0.06);border-left:2px solid rgba(255,159,67,0.3);border-radius:0 0.375rem 0.375rem 0}

/* Markdown rendered styles */
.md-h1{font-size:0.9rem;font-weight:700;color:#fff;margin:0.75rem 0 0.25rem}
.md-h2{font-size:0.85rem;font-weight:600;color:#e8e8ed;margin:0.625rem 0 0.2rem}
.md-h3{font-size:0.8rem;font-weight:600;color:#ccc;margin:0.5rem 0 0.15rem}
.md-p{font-size:0.8rem;color:#e8e8ed;line-height:1.6;margin:0.25rem 0}
.md-ul{margin:0.25rem 0;padding-left:0}
.md-li{font-size:0.8rem;color:#e8e8ed;line-height:1.5}
.md-cb{display:flex;align-items:center;gap:0.5rem;padding:0.35rem 0.5rem;margin:0.125rem 0;border-radius:0.5rem;cursor:pointer;font-size:0.8rem;color:#e8e8ed;transition:background 0.12s}
.md-cb:hover{background:rgba(255,255,255,0.04)}
.md-cb input[type=checkbox]{-webkit-appearance:none;appearance:none;width:1rem;height:1rem;border:2px solid rgba(255,255,255,0.2);border-radius:0.25rem;cursor:pointer;flex-shrink:0;position:relative;transition:all 0.12s}
.md-cb input[type=checkbox]:checked{border-color:#2ed573;background:#2ed573}
.md-cb input[type=checkbox]:checked::after{content:'✓';position:absolute;top:-0.1rem;left:0.1rem;font-size:0.7rem;color:#fff;font-weight:700}
.md-cb.checked span{color:#888;text-decoration:line-through}

/* Empty, loading, error */
.empty-state{text-align:center;padding:1.5rem 1rem;color:#888;font-size:0.78rem}
.empty-state .icon{font-size:2rem;margin-bottom:0.5rem;opacity:0.3}
.loading{text-align:center;padding:1.5rem;color:#888;font-size:0.78rem}
.spinner{display:inline-block;width:1.2rem;height:1.2rem;border:2px solid rgba(255,255,255,0.08);border-top-color:#5b9aff;border-radius:50%;animation:spin 0.6s linear infinite;margin-bottom:0.5rem}
@keyframes spin{to{transform:rotate(360deg)}}
.error-msg{text-align:center;padding:1.5rem;color:#ff6b6b;font-size:0.78rem}
.error-msg .detail{font-size:0.65rem;color:#888;margin-top:0.25rem;word-break:break-all}

/* Type buttons */
.type-buttons{display:flex;gap:0.375rem}
.type-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:0.25rem;padding:0.5rem 0.25rem;border-radius:0.5rem;font-size:0.75rem;font-weight:500;cursor:pointer;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);color:#888;transition:all 0.12s}
.type-btn.active{background:var(--type-bg);border-color:var(--type-color);color:var(--type-color)}
.type-dot{display:inline-block;width:0.5rem;height:0.5rem;border-radius:50%;flex-shrink:0}
.type-btn{gap:0.375rem}
.course-btn{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);color:#e8e8ed;padding:0.4rem 0.75rem;border-radius:0.5rem;font-size:0.78rem;cursor:pointer}
.course-btn:active{background:rgba(255,107,157,0.12);border-color:#ff6b9d}
}
</style>
<!-- ===== DESKTOP CSS ===== -->
<style>
@media(min-width:768px){
html{font-size:16px}
body{background:#0f0f13;color:#e8e8ed}
.app{display:flex;min-height:100vh}
#desktopView{display:flex;min-height:100vh}

/* Sidebar */
.sidebar{width:220px;border-right:1px solid rgba(255,255,255,0.06);padding:1.5rem 0.75rem;flex-shrink:0;display:flex;flex-direction:column}
.sidebar .logo{font-size:1.2rem;font-weight:700;color:#fff;padding:0 0.75rem 1.5rem;display:flex;align-items:center;gap:0.375rem}
.sidebar .logo span{font-size:0.8rem;color:#999;font-weight:400}
.sidebar nav{display:flex;flex-direction:column;gap:0.125rem;flex:1}
.nav-item{display:flex;align-items:center;gap:0.5rem;padding:0.5rem 0.75rem;border-radius:0.5rem;font-size:0.85rem;color:#888;cursor:pointer;transition:all 0.12s;background:none;border:none;text-align:left;width:100%}
.nav-item:hover{background:rgba(255,255,255,0.04);color:#aaa}
.nav-item.active{background:rgba(91,154,255,0.1);color:#5b9aff;font-weight:500}
.nav-item .badge{margin-left:auto;font-size:0.65rem;background:rgba(91,154,255,0.15);color:#5b9aff;padding:0.1rem 0.4rem;border-radius:0.75rem;font-weight:500}
.nav-divider{height:1px;background:rgba(255,255,255,0.06);margin:0.5rem 0.75rem}

/* Main */
.main{flex:1;overflow-y:auto;padding:1.5rem 2rem;overscroll-behavior:contain}

/* Top bar */
.top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem}
.top-bar .greeting{font-size:1.25rem;font-weight:600;color:#fff}
.top-bar .greeting small{font-size:0.75rem;color:#888;font-weight:400;margin-left:0.75rem}
.top-bar .actions{display:flex;gap:0.5rem}
.top-bar .btn{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);color:#ccc;padding:0.4rem 0.85rem;border-radius:0.5rem;font-size:0.8rem;cursor:pointer;transition:background 0.12s}
.top-bar .btn:hover{background:rgba(91,154,255,0.12);color:#5b9aff}
.top-bar .btn.primary{background:#5b9aff;color:#fff;border-color:#5b9aff}
.top-bar .btn.primary:hover{background:#4a89f0}

/* Dashboard 3-col grid */
.dash-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem}
.dash-col{display:flex;flex-direction:column;gap:0.75rem}
@media(max-width:1100px){.dash-grid{grid-template-columns:1fr 1fr}}

/* Panel */
.panel{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:0.75rem;overflow:hidden}
.panel-header{display:flex;align-items:center;justify-content:space-between;padding:0.75rem 1rem 0.5rem}
.panel-title{font-size:0.7rem;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:0.05em}
.panel-action{font-size:0.65rem;color:#5b9aff;cursor:pointer;background:none;border:none}
.panel-body{padding:0 1rem 0.75rem}

/* Mini calendar */
.mini-cal{display:flex;gap:0.25rem}
.mini-day{flex:1;text-align:center;padding:0.3rem 0;border-radius:0.375rem}
.mini-day .dow{font-size:0.6rem;color:#aaa}
.mini-day .num{font-size:0.8rem;font-weight:500;color:#aaa;margin-top:0.1rem}
.mini-day.today{background:rgba(91,154,255,0.12)}
.mini-day.today .num{color:#5b9aff;font-weight:600}
.mini-day.today .dow{color:#5b9aff}

/* Event row in panel */
.event-row{display:flex;gap:0.5rem;padding:0.375rem 0;align-items:flex-start}
.event-row+.event-row{border-top:1px solid rgba(255,255,255,0.04)}
.event-dot{width:6px;height:6px;border-radius:50%;margin-top:0.35rem;flex-shrink:0}
.event-info{flex:1}
.event-info .title{font-size:0.8rem;color:#e8e8ed}

<script>
// ==================== SHOW/HIDE MOBILE VS DESKTOP ====================
// This ensures only the correct view is visible based on screen width
(function() {
  var m = document.getElementById('mobileView');
  var d = document.getElementById('desktopView');

    m.style.display = w < 768 ? '' : 'none';

// ==================== SUPABASE REST ====================
var SB_URL = 'https://pkxmsfyzcphzvuangrzs.supabase.co';
var SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBreG1zZnl6Y3BoenZ1YW5ncnpzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwNDkxNzcsImV4cCI6MjA5NDYyNTE3N30.K1_niR4ZylqzbDPFnmTs5HRo2aEbObkGw3V9clM1czo';

function api(method, table, params, body) {
  var url = SB_URL + '/rest/v1/' + table;
  if (params) url += '?' + params;
  return fetch(url, {
    method: method,
    headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json' },
    body: body ? JSON.stringify(body) : null
  });
}

// ==================== STATE ====================
var S = {
  events: [], projects: [], goals: [], entries: [],
  today: new Date(), selDate: new Date(),
  eFilter: 'all', loaded: false, err: null
};
var D = 86400000;

function fmt(d) { var y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),dd=String(d.getDate()).padStart(2,'0'); return y+'-'+m+'-'+dd; }
function isT(d) { var t=S.today; return d.getFullYear()===t.getFullYear()&&d.getMonth()===t.getMonth()&&d.getDate()===t.getDate(); }
function dow(d) { return ['日','一','二','三','四','五','六'][d.getDay()]; }
function esc(s){return String(s||'').replace(/[&<>"]/g,function(m){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]||m;});}
function trunc(s,n){return s&&s.length>n?s.slice(0,n)+'…':s||'';}
function isPast(e) {
  if(e.event_date<fmt(S.today))return true;
  if(e.event_date===fmt(S.today)){
    if(!e.start_time)return false; // 无时间 → 当天24:00才过期（即次日才变灰）
    var n=new Date(),p=e.start_time.split(':');
    var t=new Date();t.setHours(parseInt(p[0]),parseInt(p[1]),0);
    if(e.end_time){var ep=e.end_time.split(':');t.setHours(parseInt(ep[0]),parseInt(ep[1]),0);}
    else{t.setHours(t.getHours()+2);}
    return n>t;
  }
  return false;
}
function calBar(events) {
  if(!events||!events.length)return '<div class="time-bar"></div>';
  var WIN=8*60, WIN_END=22*60, WIN_LEN=WIN_END-WIN;
  var cols={life:'#a078ff',work:'#ff9f43',course:'#ff6b9d'};
  var segs=[];
  for(var i=0;i<events.length;i++){
    var e=events[i],s,en;
    if(e.start_time){var sp=e.start_time.split(':');s=parseInt(sp[0])*60+parseInt(sp[1]);}else s=WIN;
    if(e.end_time){var ep=e.end_time.split(':');en=parseInt(ep[0])*60+parseInt(ep[1]);}else en=s+120;
    var l=Math.max(s,WIN),r=Math.min(en,WIN_END);
    if(l>=WIN_END||r<=WIN)continue;
    segs.push({left:(l-WIN)/WIN_LEN*100,width:Math.max((r-l)/WIN_LEN*100,1),color:cols[e.event_type]||'#a078ff'});
  }
  if(!segs.length)return '<div class="time-bar"></div>';
  var html='';
  for(var i=0;i<segs.length;i++)html+='<div class="time-fill" style="left:'+segs[i].left+'%;width:'+segs[i].width+'%;background:'+segs[i].color+'"></div>';
  return '<div class="time-bar">'+html+'</div>';
}

function mdToHtml(md, eid){
  if(!md)return'';
  var h=esc(md);
  h=h.replace(/^### (.+)$/gm,'<div class="md-h3">$1</div>');
  h=h.replace(/^## (.+)$/gm,'<div class="md-h2">$1</div>');
  h=h.replace(/^# (.+)$/gm,'<div class="md-h1">$1</div>');
  h=h.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  h=h.replace(/^- \[x\] (.+)$/gim,'<label class="md-cb checked"><input type="checkbox" checked data-eid="'+eid+'"><span>$1</span></label>');
  h=h.replace(/^- \[ \] (.+)$/gim,'<label class="md-cb"><input type="checkbox" data-eid="'+eid+'"><span>$1</span></label>');
  h=h.replace(/^- (.+)$/gm,'<li class="md-li">$1</li>');
  h=h.replace(/((?:<(?:label|li)[^>]*>.*?<\/(?:label|li)>\n?)+)/g,'<div class="md-ul">$1</div>');
  h=h.replace(/\n\n/g,'</div><div class="md-p">');
  h='<div class="md-p">'+h+'</div>';
  h=h.replace(/<div class="md-p"><\/div>/g,'');
  return h;
}

// ==================== DATA ====================
async function loadAll() {
  S.err = null;
  try {
    var r = await Promise.all([
      api('GET','calendar_events?order=event_date').then(function(r2){if(!r2.ok)throw Error('events:'+r2.status);return r2.json();}),
      api('GET','projects?order=created_at').then(function(r2){if(!r2.ok)throw Error('projects:'+r2.status);return r2.json();}),
      api('GET','goals?order=created_at').then(function(r2){if(!r2.ok)throw Error('goals:'+r2.status);return r2.json();}),
      api('GET','entries?order=created_at.desc&limit=50').then(function(r2){if(!r2.ok)throw Error('entries:'+r2.status);return r2.json();})
    ]);
    S.events=r[0]||[]; S.projects=r[1]||[]; S.goals=r[2]||[]; S.entries=r[3]||[];
  } catch(e) { S.err=e.message; console.error(e); }
  S.loaded = true;
  renderAll();
}

async function crudInsert(table, data) {
  var r = await api('POST', table, null, data);
  if (!r.ok) { console.error(await r.text()); return false; }
  return true;
}
async function addEvent(d) { if(await crudInsert('calendar_events',d)) { await loadAll(); return true; } return false; }
async function crudUpdate(table, id, data) {
  var r = await api('PATCH', table, 'id=eq.'+id, data);
  if (!r.ok) { console.error(await r.text()); return false; }
  return true;
}
async function updateEvent(id, data, keepDetail) {
  if(await crudUpdate('calendar_events',id,data)) {
    // 刷新数据但不重绘UI——Save回调里自己处理
    for(var j=0;j<S.events.length;j++){if(S.events[j].id===id){Object.assign(S.events[j],data);break;}}
    return true;
  }
  return false;
}
async function crudDelete(table, id) {
  var r = await api('DELETE', table, 'id=eq.'+id);
  if (!r.ok) { console.error(await r.text()); return false; }
  return true;
}
async function deleteEvent(id) { if(await crudDelete('calendar_events',id)) { await loadAll(); return true; } return false; }

function renderCal() {

function evtHtml(items) {
  if(!items||!items.length)return'<div class="empty-state"><div class="icon">📭</div><div class="msg">暂无事项</div></div>';
  return items.map(function(e){
    var c=e.event_type==='work'?'#ff9f43':e.event_type==='life'?'#a078ff':'#ff6b9d';
    return'<div class="card"><div class="event-item'+(isPast(e)?' past':'')+'" data-eid="'+e.id+'"><div class="event-dot" style="background:'+c+'"></div><div class="event-body"><div class="event-title'+(isPast(e)?' past':'')+'">'+esc(e.title)+'</div><div class="event-desc'+(isPast(e)?' past':'')+'">'+(e.start_time||'')+(e.start_time&&e.description?' · ':'')+trunc(esc(e.description||''),60)+'</div></div></div></div>';
  }).join('');
}

function renderEvents() {
  var ts=fmt(S.selDate);
  var dayEvents=S.events.filter(function(e){return e.event_date===ts}).sort(function(a,b){return(a.start_time||'')>(b.start_time||'')?1:-1;});
  // 按时间段分组
  var groups={morning:[],afternoon:[],evening:[]};
  dayEvents.forEach(function(e){
    if(!e.start_time){groups.morning.push(e);return;}
    var h=parseInt(e.start_time.split(':')[0]);
    if(h<12)groups.morning.push(e);
    else if(h<18)groups.afternoon.push(e);
    else groups.evening.push(e);
  });
  var gl={morning:'🌅 上午',afternoon:'☀️ 下午',evening:'🌙 晚上'};
  var html='';
  ['morning','afternoon','evening'].forEach(function(k){
    var items=groups[k];
    if(!items||!items.length)return;
    html+='<div class="section-title">'+gl[k]+'</div>'+evtHtml(items);
  });
  if(!html)html=evtHtml([]);
  document.getElementById('todayEvents').innerHTML=html;
}

  var delBtn=document.getElementById('detailDelBtn');
  if(!delBtn){delBtn=document.createElement('button');delBtn.id='detailDelBtn';delBtn.style.cssText='background:none;border:none;color:#ff6b6b;font-size:0.75rem;cursor:pointer;padding:0.2rem 0.5rem;border-radius:0.375rem;font-weight:500;margin-left:0.25rem';delBtn.textContent='删除';document.getElementById('modalClose').parentNode.insertBefore(delBtn,document.getElementById('modalClose'));}
  delBtn.onclick=function(){if(confirm('确定删除「'+e.title+'」？')){deleteEvent(e.id);closeModal();}};
  delBtn.style.display='';
  renderDetail(e,d);
  o.classList.add('show');
}
function renderDetail(e,d){
  var tm=e.start_time?' '+e.start_time:'';
  var tl=esc(e.title);
  var ty='<span class="type-dot" style="background:'+(e.event_type==='work'?'#ff9f43':e.event_type==='life'?'#a078ff':'#ff6b9d')+';vertical-align:middle;margin-right:0.25rem"></span>'+(e.event_type==='work'?'工作':e.event_type==='course'?'课程':'生活');
  var html='<div class="detail-title">'+tl+'</div>';
  html+='<div class="detail-meta">'+esc(e.event_date)+tm+' · '+ty+'</div>';
  // AI-generated detail_html (structured layout)
  if(e.detail_html){
    html+='<div class="detail-html" style="margin-top:0.625rem">'+e.detail_html+'</div>';
  }
  // User-editable description (plain text, no Markdown)
  if(e.description){
    html+='<div class="detail-desc" style="margin-top:0.625rem">'+esc(e.description)+'</div>';
  }
  d.innerHTML=html;
  // Packing tag click handlers (toggle done)
  d.querySelectorAll('.detail-pack-tag').forEach(function(tag){
    tag.onclick=function(){this.classList.toggle('done');};
  });
}
function showEditForm(e,d){
  var ty=e.event_type||'life';
  var tyBtn='<div class="type-buttons"><button type="button" class="type-btn'+(ty==='life'?' active':'')+'" data-value="life" style="--type-color:#a078ff;--type-bg:rgba(160,120,255,0.15)"><span class="type-dot" style="background:#a078ff"></span>生活</button><button type="button" class="type-btn'+(ty==='work'?' active':'')+'" data-value="work" style="--type-color:#ff9f43;--type-bg:rgba(255,159,67,0.15)"><span class="type-dot" style="background:#ff9f43"></span>工作</button><button type="button" class="type-btn'+(ty==='course'?' active':'')+'" data-value="course" style="--type-color:#ff6b9d;--type-bg:rgba(255,107,157,0.15)"><span class="type-dot" style="background:#ff6b9d"></span>课程</button></div><input type="hidden" id="editEventType" value="'+ty+'">';
  var html='<form style="display:flex;flex-direction:column;gap:0.5rem" onsubmit="return false"><label>类型</label>'+tyBtn+'<label>标题</label><input id="editTitle" value="'+esc(e.title)+'" required><div class="form-row"><div class="date-field"><label>日期</label><input id="editDate" type="date" value="'+e.event_date+'"></div><div class="time-field"><label>时间</label><input id="editTime" type="time" value="'+(e.start_time||'')+'" step="900"></div></div>'
  html+='<label>备注</label><textarea id="editDesc" rows="4" style="font-size:0.8rem">'+(e.description||'')+'</textarea>';
  html+='<div style="display:flex;gap:0.5rem"><button type="button" class="btn-submit" id="saveEditBtn" style="flex:1">💾 保存</button><button type="button" class="btn-submit" id="cancelEditBtn" style="flex:1;background:rgba(255,255,255,0.06);color:#888">取消</button></div></form>';
  d.innerHTML=html;
  d.querySelectorAll('.type-btn').forEach(function(b){b.onclick=function(){d.querySelectorAll('.type-btn').forEach(function(x){x.classList.remove('active');});this.classList.add('active');document.getElementById('editEventType').value=this.dataset.value;};});
  document.getElementById('saveEditBtn').onclick=function(){
    var title=document.getElementById('editTitle').value.trim();
    var desc=document.getElementById('editDesc').value.trim();
    var newType=document.getElementById('editEventType').value;
    var newDate=document.getElementById('editDate').value;
    var newTime=document.getElementById('editTime').value||null;
    if(!title)return;
    var data={title:title,description:desc||null,event_type:newType,event_date:newDate,start_time:newTime};
    if(!data.description)delete data.description;
    api('PATCH','calendar_events','id=eq.'+e.id,data).then(function(r){
      if(r.ok){
        e.title=title;e.description=desc||null;e.event_type=newType;e.event_date=newDate;e.start_time=newTime;
        renderDetail(e,d);
      }else{alert('保存失败');}
    });
  };
  document.getElementById('cancelEditBtn').onclick=function(){renderDetail(e,d);};
  d.addEventListener('keydown',function(ke){if(ke.key==='Escape'){renderDetail(e,d);}});
}

// Export
document.getElementById('exportBtn').onclick=function(){
  var blob=new Blob([JSON.stringify({events:S.events,projects:S.projects,goals:S.goals,entries:S.entries},null,2)],{type:'application/json'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='dashboard-'+fmt(S.today)+'.json';a.click();
};

// Version cache busting - increment on each deploy
var VERSION = '0.3.1';
console.log('🚀 主宰面板 v'+VERSION);

// Start
loadAll();
</script>
