<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>方向与聚焦 · 星空 v2</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html{font-size:calc(100vw/375*16);touch-action:manipulation}
  body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro","PingFang SC","Helvetica Neue",sans-serif;background:#08080e;color:#e8e8ed;line-height:1.5;-webkit-font-smoothing:antialiased}

  .app{max-width:430px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;position:relative;background:#08080e}

  /* ===== HEADER ===== */
  .header{padding:1.5rem 1rem 0.25rem;background:#08080e;text-align:center}
  .header h1{font-size:1.15rem;font-weight:700;color:#fff;letter-spacing:0.04em}
  .header .sub{font-size:0.65rem;color:#444;margin-top:0.1rem;letter-spacing:0.02em}

  /* ===== SKY CANVAS ===== */
  .sky{
    flex:1;
    overflow-y:auto;
    position:relative;
    padding:0.25rem 1rem 5.5rem;
    -webkit-overflow-scrolling:touch;
  }

  /* Background nebula layers */
  .nebula{
    position:absolute;
    border-radius:50%;
    filter:blur(60px);
    pointer-events:none;
    z-index:0;
  }
  .nebula.n1{
    width:200px;height:200px;
    background:radial-gradient(circle, rgba(91,154,255,0.04) 0%, transparent 70%);
    top:0;left:50%;transform:translateX(-50%);
  }
  .nebula.n2{
    width:160px;height:160px;
    background:radial-gradient(circle, rgba(160,120,255,0.03) 0%, transparent 70%);
    bottom:180px;right:-30px;
  }

  /* ===== STAR CONTAINER (inverted T layout) ===== */
  .star-zone{
    position:relative;
    z-index:1;
  }

  /* Zone labels - very subtle */
  .zone-label{
    text-align:center;
    font-size:0.55rem;
    color:#333;
    letter-spacing:0.08em;
    text-transform:uppercase;
    margin-bottom:0;
    font-weight:500;
    user-select:none;
  }
  .zone-label.lit{color:#444}

  /* ===== POLARIS STRIP (top) ===== */
  .polaris-area{
    display:flex;
    justify-content:center;
    gap:1.5rem;
    padding:1rem 0 1.5rem;
    position:relative;
  }
  .polaris-area::after{
    content:'';
    position:absolute;
    bottom:0;
    left:20%;right:20%;
    height:1px;
    background:linear-gradient(90deg, transparent, rgba(255,255,255,0.04), transparent);
  }

  /* ===== INDIVIDUAL STAR ===== */
  .star{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:0.2rem;
    cursor:pointer;
    transition:transform 0.2s;
  }
  .star:active{transform:scale(1.06)}

  .star .orb{
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    transition:box-shadow 0.3s;
    position:relative;
  }
  .star .orb::after{
    content:'';
    position:absolute;
    border-radius:50%;
    pointer-events:none;
  }

  /* Polaris */
  .star.polaris .orb{
    width:3.2rem;height:3.2rem;
    font-size:1.3rem;
    background:radial-gradient(circle at 35% 35%, #ffe680, #f0a500);
    box-shadow:
      0 0 20px rgba(255,215,0,0.25),
      0 0 50px rgba(255,215,0,0.08),
      inset 0 -2px 4px rgba(0,0,0,0.2);
  }
  .star.polaris .orb::after{
    inset:-4px;
    border:1px solid rgba(255,215,0,0.06);
  }
  .star.polaris .name{
    font-size:0.6rem;
    color:#ffd700;
    font-weight:600;
    text-align:center;
    line-height:1.3;
  }
  .star.polaris .meta{
    font-size:0.5rem;
    color:#665500;
    text-align:center;
  }

  /* Major star */
  .star.major .orb{
    width:2.4rem;height:2.4rem;
    font-size:1rem;
    background:radial-gradient(circle at 35% 35%, #b895ff, #7c5cf0);
    box-shadow:
      0 0 14px rgba(160,120,255,0.2),
      0 0 35px rgba(160,120,255,0.06);
  }
  .star.major .orb::after{
    inset:-3px;
    border:1px solid rgba(160,120,255,0.06);
  }
  .star.major .name{
    font-size:0.55rem;
    color:#a078ff;
    font-weight:500;
    text-align:center;
    line-height:1.2;
    max-width:5rem;
  }

  /* Active focus */
  .star.active .orb{
    width:1.6rem;height:1.6rem;
    font-size:0.75rem;
    background:radial-gradient(circle at 35% 35%, #7cbaff, #3d7ae0);
    box-shadow:
      0 0 10px rgba(91,154,255,0.2),
      0 0 25px rgba(91,154,255,0.05);
  }
  .star.active .orb::after{
    inset:-2px;
    border:1px solid rgba(91,154,255,0.08);
  }
  .star.active .name{
    font-size:0.52rem;
    color:#5b9aff;
    text-align:center;
    line-height:1.15;
    max-width:4rem;
  }

  /* Completed / dormant */
  .star.done .orb{
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.04);
    box-shadow:none;
  }
  .star.done .name{
    font-size:0.48rem;
    color:#444;
    text-align:center;
    line-height:1.15;
    max-width:3.5rem;
  }

  /* ===== PRODUCT ZONE (upper-middle) ===== */
  .zone-row{
    display:flex;
    justify-content:space-around;
    align-items:flex-start;
    padding:1.5rem 0 1.25rem;
    position:relative;
  }
  .zone-row::after{
    content:'';
    position:absolute;
    bottom:0;
    left:10%;right:10%;
    height:1px;
    background:linear-gradient(90deg, transparent, rgba(255,255,255,0.03), transparent);
  }

  .zone-col{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:0.75rem;
    position:relative;
  }

  /* Zone center label */
  .zone-heading{
    font-size:0.55rem;
    color:#2a2a2a;
    letter-spacing:0.06em;
    font-weight:500;
    margin-bottom:0.25rem;
    padding:0.1rem 0.4rem;
    border-radius:0.2rem;
    background:rgba(255,255,255,0.02);
    user-select:none;
  }

  /* ===== HOME ZONE (bottom) ===== */
  .home-area{
    padding:1.5rem 0 0.5rem;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:0.75rem;
    position:relative;
  }

  /* Home stars inline */
  .home-row{
    display:flex;
    gap:0.6rem;
    justify-content:center;
    flex-wrap:wrap;
  }

  /* ===== 本期聚焦 (below) ===== */
  .focus-head{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:0.5rem;
    padding:1.25rem 0 0.75rem;
  }
  .focus-head span{font-size:0.6rem;color:#3a3a3a;letter-spacing:0.06em}
  .focus-head::before,.focus-head::after{
    content:'';flex:1;height:1px;
    background:linear-gradient(90deg, transparent, rgba(255,255,255,0.04), transparent);
  }

  .focus-item{
    background:rgba(255,255,255,0.02);
    border:1px solid rgba(255,255,255,0.04);
    border-radius:0.7rem;
    padding:0.7rem 0.85rem;
    margin-bottom:0.5rem;
    display:flex;
    align-items:center;
    gap:0.65rem;
    transition:background 0.15s;
    cursor:pointer;
  }
  .focus-item:active{background:rgba(255,255,255,0.04)}
  .focus-dot{
    width:2rem;height:2rem;
    border-radius:0.5rem;
    display:flex;align-items:center;justify-content:center;
    font-size:0.85rem;
    flex-shrink:0;
  }
  .focus-dot.dev{background:rgba(91,154,255,0.08);color:#5b9aff}
  .focus-dot.read{background:rgba(160,120,255,0.08);color:#a078ff}
  .focus-dot.write{background:rgba(46,213,115,0.08);color:#2ed573}
  .focus-body{flex:1;min-width:0}
  .focus-body .fm-title{font-size:0.8rem;color:#ddd}
  .focus-body .fm-meta{font-size:0.6rem;color:#444;margin-top:0.05rem;display:flex;gap:0.35rem;align-items:center}
  .focus-link{
    font-size:0.5rem;padding:0.04rem 0.25rem;
    border-radius:0.15rem;
    background:rgba(160,120,255,0.08);color:#a078ff;
  }
  .focus-tag{
    font-size:0.55rem;padding:0.08rem 0.3rem;
    border-radius:0.2rem;
    background:rgba(46,213,115,0.08);color:#2ed573;
  }

  .add-btn{
    display:flex;align-items:center;justify-content:center;gap:0.35rem;
    padding:0.6rem;
    border:1px dashed rgba(255,255,255,0.06);
    border-radius:0.5rem;
    font-size:0.65rem;color:#5b9aff;
    cursor:pointer;margin-top:0.25rem;
    background:none;width:100%;
    transition:border 0.15s;
  }
  .add-btn:active{border-color:rgba(91,154,255,0.2)}

  /* ===== LEGEND ===== */
  .legend{
    display:flex;justify-content:center;gap:1rem;
    padding:0.75rem 0 0.25rem;
    font-size:0.5rem;color:#333;
  }
  .legend span{display:flex;align-items:center;gap:0.25rem}
  .legend .ld{width:6px;height:6px;border-radius:50%;display:inline-block}
  .legend .ld.b{background:#5b9aff}
  .legend .ld.g{background:rgba(255,255,255,0.1)}
  .legend .ld.d{background:rgba(255,255,255,0.04)}

  /* ===== TAB BAR ===== */
  .tab-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(8,8,14,0.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid rgba(255,255,255,0.05);display:flex;padding:0.375rem 0 0.75rem;z-index:100}
  .tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:0.1rem;padding:0.25rem;background:none;border:none;color:#444;font-size:0.6rem;cursor:pointer;transition:color 0.15s}
  .tab-btn.active{color:#fff}
  .tab-btn .icon{font-size:1.2rem;line-height:1}
  .tab-btn .label{font-weight:500}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>🎯 方向与聚焦</h1>
    <div class="sub">你做的每件事，都在星空里有一个位置</div>
  </div>

  <div class="sky">

    <!-- ===== NEBULA BACKGROUND ===== -->
    <div class="nebula n1"></div>
    <div class="nebula n2"></div>

    <!-- ===== ZONE 1: POLARIS (北极星) ===== -->
    <div class="star-zone" style="position:relative;z-index:1">
      <div class="polaris-area">
        <div class="star polaris">
          <div class="orb">⭐</div>
          <div class="name">生活即工作</div>
          <div class="meta">一辈子</div>
        </div>
      </div>

      <!-- ===== ZONE 2: MAJOR GOAL ===== -->
      <div style="display:flex;justify-content:center;gap:1.5rem;padding:0.25rem 0 1rem">
        <div class="star major">
          <div class="orb">🌐</div>
          <div class="name" style="max-width:6rem">AI数字化人生</div>
        </div>
      </div>

      <!-- ===== ZONE 3: MIDDLE BAND (产品 / AI / 内容) ===== -->
      <div class="zone-row">
        <!-- 🪐 产品 -->
        <div class="zone-col">
          <div class="zone-heading">🪐 产品</div>
          <div class="star active">
            <div class="orb">🎮</div>
            <div class="name">写字<br>小程序</div>
          </div>
          <div class="star done">
            <div class="orb" style="font-size:0.7rem">24</div>
            <div class="name">24点</div>
          </div>
        </div>

        <!-- 🛸 AI工具 -->
        <div class="zone-col">
          <div class="zone-heading">🛸 AI</div>
          <div class="star active">
            <div class="orb">🖥️</div>
            <div class="name">主宰<br>面板</div>
          </div>
          <div class="star done">
            <div class="orb" style="font-size:0.6rem">🤖</div>
            <div class="name">Agent<br>日报</div>
          </div>
        </div>

        <!-- 🌐 内容 -->
        <div class="zone-col">
          <div class="zone-heading">🌐 内容</div>
          <div class="star active">
            <div class="orb">✏️</div>
            <div class="name">公众号</div>
          </div>
          <div class="star done">
            <div class="orb" style="font-size:0.6rem">🔍</div>
            <div class="name">引光<br>小站</div>
          </div>
          <div class="star done">
            <div class="orb" style="font-size:0.5rem">🐼</div>
            <div class="name">天才<br>小熊猫</div>
          </div>
        </div>
      </div>

      <!-- ===== ZONE 4: HOME (底部) ===== -->
      <div class="home-area">
        <div class="zone-heading" style="background:rgba(255,255,255,0.015);padding:0.15rem 0.5rem">🏠 家庭与生活</div>
        <div class="home-row">
          <div class="star active">
            <div class="orb" style="width:1.4rem;height:1.4rem;font-size:0.65rem">📋</div>
            <div class="name" style="font-size:0.48rem;max-width:3rem">每日<br>打卡</div>
          </div>
          <div class="star done">
            <div class="orb" style="width:1.2rem;height:1.2rem;font-size:0.55rem;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.04)">📖</div>
            <div class="name" style="font-size:0.45rem;max-width:2.5rem">心理学<br>笔记</div>
          </div>
          <div class="star active">
            <div class="orb" style="width:1.4rem;height:1.4rem;font-size:0.65rem">👧</div>
            <div class="name" style="font-size:0.48rem;max-width:3rem">老二<br>陪伴</div>
          </div>
        </div>
      </div>

      <!-- ===== LEGEND ===== -->
      <div class="legend">
        <span><span class="ld b"></span>当前聚焦</span>
        <span><span class="ld g"></span>已完成</span>
        <span><span class="ld d"></span>长期</span>
      </div>

      <!-- ===== 本期聚焦 ===== -->
      <div class="focus-head"><span>🔭 本期聚焦</span></div>

      <div class="focus-item">
        <div class="focus-dot dev">🖥️</div>
        <div class="focus-body">
          <div class="fm-title">主宰面板</div>
          <div class="fm-meta">进行中 · 始于 5/25 <span class="focus-link">→ AI数字化人生</span></div>
        </div>
        <span class="focus-tag">活跃</span>
      </div>

      <div class="focus-item">
        <div class="focus-dot dev">🎮</div>
        <div class="focus-body">
          <div class="fm-title">写字小程序</div>
          <div class="fm-meta">产品迭代中 <span class="focus-link">→ 产品</span></div>
        </div>
        <span class="focus-tag">持续</span>
      </div>

      <div class="focus-item">
        <div class="focus-dot read">👧</div>
        <div class="focus-body">
          <div class="fm-title">老二陪伴计划</div>
          <div class="fm-meta">持续关注 <span class="focus-link">→ 家庭</span></div>
        </div>
        <span class="focus-tag">日常</span>
      </div>

      <button class="add-btn">＋ 记录一个新的聚焦点</button>

    </div>
  </div>

  <!-- ===== TAB BAR ===== -->
  <div class="tab-bar">
    <button class="tab-btn">📅 <span class="label">日历</span></button>
    <button class="tab-btn">📊 <span class="label">项目</span></button>
    <button class="tab-btn active"><span class="icon">🎯</span><span class="label">方向</span></button>
    <button class="tab-btn">📚 <span class="label">库</span></button>
  </div>
</div>
</body>
</html>
